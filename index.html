<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shop Scan Drive POS</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* HEADER */
.header{
  padding:12px;
  background:#111827;
  font-weight:bold;
}

/* CONTAINER */
.container{padding:10px;}

/* BUTTONS */
.btn{
  width:100%;
  padding:10px;
  margin-top:6px;
  border:none;
  border-radius:8px;
  font-size:14px;
}

/* INPUT */
input,select{
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  border:none;
}

/* CAMERA */
video{
  width:100%;
  border-radius:10px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

/* CARD */
.card{
  background:#1f2937;
  padding:10px;
  border-radius:10px;
  position:relative;
}

/* QR SMALL OVERLAY */
.qr{
  position:absolute;
  bottom:6px;
  right:6px;
  width:60px;
  height:60px;
  background:white;
  padding:3px;
  border-radius:6px;
}

/* POPUP */
.popup{
  position:fixed;
  top:10%;
  left:5%;
  width:90%;
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  display:none;
  z-index:10;
}
</style>
</head>

<body>

<div class="header">📦 Scan + Drive POS System</div>

<div class="container">

<!-- CLIENT ID -->
<div class="card">
  <h3>🔑 Google Client ID</h3>
  <input id="clientIdInput" placeholder="Paste YOUR_CLIENT_ID.apps.googleusercontent.com">
  <button class="btn" onclick="saveClientId()">Save Client ID</button>
</div>

<button class="btn" onclick="initGoogle()">Initialize Google</button>
<button class="btn" onclick="login()">Login</button>

<!-- CAMERA -->
<video id="video" autoplay></video>
<button class="btn" onclick="capture()">📸 Scan Item</button>

<canvas id="canvas" style="display:none;"></canvas>

<!-- DASHBOARD -->
<div id="view"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">

<h3>Item Form</h3>

<input id="name" placeholder="Name">
<input id="price" type="number" placeholder="Price">

<select id="category">
  <option>Food</option>
  <option>Drink</option>
  <option>Electronics</option>
</select>

<button class="btn" onclick="saveItem()">💾 Save to Drive</button>
<button class="btn" onclick="popup.style.display='none'">Close</button>

</div>

<script>

/* ================= GLOBALS ================= */

let CLIENT_ID = "";
let token = "";
let imageData = "";

/* ================= CLIENT ID ================= */

function saveClientId(){
  CLIENT_ID = clientIdInput.value;
  localStorage.setItem("client_id", CLIENT_ID);
  alert("Client ID saved");
}

window.onload = () => {
  const saved = localStorage.getItem("client_id");
  if(saved){
    CLIENT_ID = saved;
    clientIdInput.value = saved;
  }
  render();
};

/* ================= GOOGLE ================= */

function initGoogle(){
  if(!CLIENT_ID){
    alert("Paste Client ID first");
    return;
  }

  google.accounts.id.initialize({
    client_id: CLIENT_ID,
    callback: handleLogin
  });

  alert("Google initialized");
}

function login(){
  google.accounts.id.prompt();
}

function handleLogin(res){
  token = res.credential;
  alert("Login success");
}

/* ================= CAMERA ================= */

navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(stream=>{
  video.srcObject = stream;
});

/* ================= CAPTURE ================= */

function capture(){

  const canvas = document.getElementById("canvas");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  canvas.getContext("2d").drawImage(video,0,0);

  imageData = canvas.toDataURL("image/png");

  popup.style.display="block";
}

/* ================= DRIVE ================= */

async function upload(blob,name,folderId){

  const form = new FormData();

  form.append("metadata", new Blob([JSON.stringify({
    name,
    parents:[folderId]
  })],{type:"application/json"}));

  form.append("file", blob);

  return fetch(
    "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",
    {
      method:"POST",
      headers:{
        "Authorization":"Bearer "+token
      },
      body:form
    }
  ).then(r=>r.json());
}

/* ================= SAVE ITEM ================= */

async function saveItem(){

  const item = {
    id: crypto.randomUUID(),
    name: name.value,
    price: Number(price.value),
    category: category.value
  };

  item.qrData = JSON.stringify(item);

  const imgBlob = await (await fetch(imageData)).blob();

  let folder = localStorage.getItem("folder_"+item.category);

  if(!folder){

    const f = await fetch("https://www.googleapis.com/drive/v3/files",{
      method:"POST",
      headers:{
        "Authorization":"Bearer "+token,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        name:item.category,
        mimeType:"application/vnd.google-apps.folder"
      })
    }).then(r=>r.json());

    folder = f.id;
    localStorage.setItem("folder_"+item.category,folder);
  }

  await upload(
    new File([imgBlob], item.id+".png"),
    item.id+".png",
    folder
  );

  await upload(
    new Blob([item.qrData],{type:"application/json"}),
    item.id+".json",
    folder
  );

  let db = JSON.parse(localStorage.getItem("db")||"[]");
  db.push(item);
  localStorage.setItem("db",JSON.stringify(db));

  popup.style.display="none";
  render();
}

/* ================= RENDER ================= */

function render(){

  const db = JSON.parse(localStorage.getItem("db")||"[]");

  let html = `<h3>📦 Items</h3><div class="grid">`;

  db.forEach(item=>{

    const div = document.createElement("div");
    div.className="card";

    const qr = document.createElement("div");
    new QRCode(qr,{
      text:item.qrData,
      width:60,
      height:60
    });
    qr.className="qr";

    div.innerHTML = `
      <b>${item.name}</b><br/>
      💰 ${item.price}<br/>
      📂 ${item.category}
    `;

    div.appendChild(qr);
    document.getElementById("view").appendChild(div);
  });
}

/* ================= INIT ================= */

render();

</script>

</body>
</html>
