<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Shop Drive FULL FIX</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body{background:#0f172a;color:white;}
header{background:#111827;padding:12px;text-align:center;font-weight:bold;}

.card-dark{
  background:#1f2937;
  padding:10px;
  border-radius:12px;
  cursor:pointer;
  text-align:center;
}

.img-card img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

.price{
  color:#22c55e;
  font-weight:bold;
  font-size:13px;
}

.breadcrumb{
  background:#111827;
  padding:8px;
  border-radius:8px;
}
</style>
</head>

<body>

<header>
  <i class="fa fa-store"></i> Smart Shop Drive FULL FIX
</header>

<div class="container py-3">

<div class="d-flex gap-2 mb-2">
  <input id="clientId" class="form-control" placeholder="Google Client ID">
  <button class="btn btn-primary" onclick="connectDrive()">
    <i class="fa fa-plug"></i>
  </button>
</div>

<div id="nav"></div>
<div id="view"></div>

</div>

<!-- IMAGE PREVIEW -->
<div class="modal fade" id="imgModal">
  <div class="modal-dialog modal-fullscreen">
    <div class="modal-content bg-black">
      <div class="modal-header bg-dark text-white">
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body d-flex justify-content-center align-items-center">
        <img id="previewImg" class="w-100 h-100 object-fit-contain">
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const el=id=>document.getElementById(id);

let token="";
let rootFolder="";
let pathStack=[];

/* CONNECT */
function connectDrive(){

  const clientId=el("clientId").value;

  const client=google.accounts.oauth2.initTokenClient({
    client_id:clientId,
    scope:"https://www.googleapis.com/auth/drive.file",
    callback:async(res)=>{
      token=res.access_token;
      await initRoot();
      openFolder(rootFolder,"Root");
    }
  });

  client.requestAccessToken();
}

/* ROOT */
async function initRoot(){

  const q=encodeURIComponent("name='TheShop' and mimeType='application/vnd.google-apps.folder' and trashed=false");

  const r=await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`,{
    headers:{Authorization:"Bearer "+token}
  });

  const d=await r.json();

  if(d.files?.length){
    rootFolder=d.files[0].id;
  }else{
    const c=await fetch("https://www.googleapis.com/drive/v3/files",{
      method:"POST",
      headers:{
        Authorization:"Bearer "+token,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({name:"TheShop",mimeType:"application/vnd.google-apps.folder"})
    });

    rootFolder=(await c.json()).id;
  }
}

/* OPEN ANY FOLDER (MAIN FIX) */
async function openFolder(folderId,folderName){

  pathStack.push({id:folderId,name:folderName});
  renderNav();

  const r=await fetch(
    `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents&fields=files(id,name,mimeType,thumbnailLink)`,
    {headers:{Authorization:"Bearer "+token}}
  );

  const d=await r.json();

  let html=`<div class='row g-2'>`;

  d.files?.forEach(f=>{

    if(f.mimeType.includes("folder")){

      html+=`
      <div class="col-6">
        <div class="card-dark" onclick="openFolder('${f.id}','${f.name}')">
          <i class="fa fa-folder fa-2x"></i>
          <div>${f.name}</div>
        </div>
      </div>`;
    }
    else{

      html+=`
      <div class="col-6">
        <div class="card-dark" onclick="preview('${f.id}')">
          <img class="img-card" src="${f.thumbnailLink || ''}">
          <div>${f.name}</div>
        </div>
      </div>`;
    }

  });

  html+="</div>";

  el("view").innerHTML=html;
}

/* NAVIGATION BAR */
function renderNav(){

  let html=`<div class="breadcrumb text-white">`;

  pathStack.forEach((p,i)=>{
    html+=` <a href="#" onclick="goTo(${i})" style="color:#60a5fa">${p.name}</a> /`;
  });

  html+=`</div>`;

  el("nav").innerHTML=html;
}

/* BACK NAV */
function goTo(index){

  pathStack=pathStack.slice(0,index+1);

  const last=pathStack[pathStack.length-1];

  openFolder(last.id,last.name);
}

/* IMAGE PREVIEW */
function preview(id){

  fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`,{
    headers:{Authorization:"Bearer "+token}
  })
  .then(r=>r.blob())
  .then(b=>{
    const url=URL.createObjectURL(b);
    el("previewImg").src=url;
    new bootstrap.Modal(el("imgModal")).show();
  });
}

</script>

</body>
</html>
