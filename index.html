<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Shop Drive FIX PRO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body{background:#0f172a;color:white;}
header{background:#111827;padding:12px;text-align:center;font-weight:bold;}
.card-dark{background:#1f2937;border-radius:12px;padding:8px;cursor:pointer;}
.card-dark:hover{background:#374151;}
img.thumb{width:100%;height:120px;object-fit:cover;border-radius:10px;}
.topbar{display:flex;gap:10px;align-items:center;margin-bottom:10px;}
button{border:none;}
</style>
</head>

<body>

<header>Smart Shop Drive PRO</header>

<div class="container py-3">

<div class="topbar">
  <button class="btn btn-warning" onclick="goBack()">
    <i class="fa fa-arrow-left"></i> Back
  </button>

  <input id="clientId" class="form-control" placeholder="Google Client ID">
  <button class="btn btn-primary" onclick="connectDrive()">Connect</button>
</div>

<video id="video" autoplay playsinline class="w-100 mb-2 rounded"></video>

<button class="btn btn-success w-100 mb-2" onclick="startCamera()">Start Camera</button>
<button class="btn btn-warning w-100 mb-3" onclick="capture()">Capture</button>

<canvas id="canvas" style="display:none;"></canvas>

<div id="view"></div>

</div>

<!-- MODAL -->
<div class="modal fade" id="modal">
  <div class="modal-dialog">
    <div class="modal-content text-dark">
      <div class="modal-header">
        <h5>Add Item</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input id="name" class="form-control mb-2" placeholder="Name">
        <input id="price" class="form-control mb-2" type="number" placeholder="Price">
      </div>

      <div class="modal-footer">
        <button class="btn btn-primary" onclick="saveItem()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- IMAGE PREVIEW -->
<div class="modal fade" id="imgModal">
  <div class="modal-dialog modal-fullscreen">
    <div class="modal-content bg-black">
      <img id="previewImg" class="w-100 h-100 object-fit-contain">
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const el = id => document.getElementById(id);

let token = "";
let rootFolder = "";
let currentFolder = null;
let imageData = "";
let stack = [];   // 🔥 BACK STACK

/* CONNECT */
function connectDrive(){
  const clientId = el("clientId").value;
  if(!clientId) return alert("Client ID missing");

  const client = google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: "https://www.googleapis.com/auth/drive.file",
    callback: async (res)=>{
      token = res.access_token;
      await initRoot();
      loadRoot();
    }
  });

  client.requestAccessToken();
}

/* ROOT */
async function initRoot(){

  const q = encodeURIComponent("name='TheShop' and mimeType='application/vnd.google-apps.folder' and trashed=false");

  const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`,{
    headers:{Authorization:"Bearer "+token}
  });

  const data = await res.json();

  if(data.files?.length){
    rootFolder = data.files[0].id;
  } else {
    const r = await fetch("https://www.googleapis.com/drive/v3/files",{
      method:"POST",
      headers:{
        Authorization:"Bearer "+token,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        name:"TheShop",
        mimeType:"application/vnd.google-apps.folder"
      })
    });

    const d = await r.json();
    rootFolder = d.id;
  }
}

/* LOAD ROOT */
async function loadRoot(){
  stack = [];
  currentFolder = rootFolder;
  await openFolder(rootFolder, "Categories", true);
}

/* OPEN FOLDER */
async function openFolder(folderId, title, isRoot=false){

  if(!isRoot) stack.push(currentFolder);
  currentFolder = folderId;

  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents&fields=files(id,name,mimeType,thumbnailLink)`,
    {headers:{Authorization:"Bearer "+token}}
  );

  const data = await res.json();

  let html = `<h5>${title}</h5><div class="row g-2">`;

  data.files.forEach(f=>{

    const isFolder = f.mimeType.includes("folder");

    if(isFolder){

      html += `
      <div class="col-6">
        <div class="card-dark text-center" onclick="openFolder('${f.id}','${f.name}')">
          <i class="fa fa-folder fa-2x"></i>
          <div>${f.name}</div>
        </div>
      </div>`;
    }
    else {
      const thumb = f.thumbnailLink || "";

      html += `
      <div class="col-6">
        <div class="card-dark" onclick="preview('${f.id}')">
          <img class="thumb" src="${thumb}">
          <div class="text-center mt-1">${f.name}</div>
        </div>
      </div>`;
    }
  });

  html += "</div>";

  el("view").innerHTML = html;
}

/* CLICK FOLDER */
function openFolder(id,name){
  openFolder(id,name,false);
}

/* BACK BUTTON */
function goBack(){
  if(stack.length===0) return loadRoot();

  const prev = stack.pop();
  openFolder(prev,"Back");
}

/* CAMERA */
async function startCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
  el("video").srcObject = stream;
}

function capture(){
  const v = el("video");
  const c = el("canvas");

  c.width = v.videoWidth;
  c.height = v.videoHeight;

  c.getContext("2d").drawImage(v,0,0);

  imageData = c.toDataURL("image/png");

  new bootstrap.Modal(el("modal")).show();
}

/* SAVE */
async function saveItem(){

  const name = el("name").value;

  if(!currentFolder) return alert("Open folder first");

  const blob = await (await fetch(imageData)).blob();

  const metadata = {
    name:name+".png",
    parents:[currentFolder]
  };

  const form = new FormData();
  form.append("metadata", new Blob([JSON.stringify(metadata)],{type:"application/json"}));
  form.append("file", blob);

  await fetch(
    "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id",
    {
      method:"POST",
      headers:{Authorization:"Bearer "+token},
      body:form
    }
  );

  bootstrap.Modal.getInstance(el("modal")).hide();

  openFolder(currentFolder,"Updated");
}

/* PREVIEW IMAGE */
function preview(fileId){
  const url = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`;

  fetch(url,{headers:{Authorization:"Bearer "+token}})
  .then(r=>r.blob())
  .then(b=>{
    el("previewImg").src = URL.createObjectURL(b);
    new bootstrap.Modal(el("imgModal")).show();
  });
}

</script>

</body>
</html>
