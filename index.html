<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Shop Drive v4 FIX</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

header{
  padding:12px;
  background:#111827;
  font-weight:bold;
}

.container{padding:10px;}

video,canvas{
  width:100%;
  border-radius:10px;
}

.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
}

.btn:active{
  transform:scale(0.98);
  opacity:0.7;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.card{
  background:#1f2937;
  padding:10px;
  border-radius:10px;
}

.popup{
  position:fixed;
  top:10%;
  left:5%;
  width:90%;
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  display:none;
  z-index:10;
}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
}
</style>
</head>

<body>

<header>📦 Smart Shop Drive v4 FIX</header>

<div class="container">

<input id="clientId" placeholder="Google Client ID"/>

<button id="connectBtn" class="btn" onclick="connectDrive()">
🔗 Connect Drive
</button>

<video id="video" autoplay playsinline></video>

<button class="btn" onclick="startCamera()">📷 Start Camera</button>
<button class="btn" onclick="capture()">📸 Capture</button>

<canvas id="canvas"></canvas>

<div id="view"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">

<h3>Add Product</h3>

<input id="name" placeholder="Product Name"/>
<input id="price" type="number" placeholder="Price"/>

<select id="category">
  <option>Food</option>
  <option>Drink</option>
  <option>Electronics</option>
</select>

<button class="btn" onclick="saveItem()">Save</button>
<button class="btn" onclick="closePopup()">Close</button>

</div>

<script>

/* ================= SAFE DOM ================= */

const el = (id)=>document.getElementById(id);

let accessToken="";
let tokenClient=null;
let shopFolderId="";
let imageData="";

/* ================= CONNECT ================= */

async function connectDrive(){

  const clientId = el("clientId").value;
  if(!clientId){
    alert("Client ID required");
    return;
  }

  const btn = el("connectBtn");
  btn.disabled=true;
  btn.innerText="Connecting...";

  if(!tokenClient){

    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: clientId,
      scope: "https://www.googleapis.com/auth/drive.file",
      callback: async (res)=>{

        accessToken = res.access_token;

        await ensureShopFolder();
        await loadDashboard();
      }
    });
  }

  tokenClient.requestAccessToken();

  setTimeout(()=>{
    btn.disabled=false;
    btn.innerText="🔗 Connect Drive";
  },1500);
}

/* ================= ROOT ================= */

async function ensureShopFolder(){

  const saved = localStorage.getItem("SHOP_ROOT");
  if(saved){
    shopFolderId = saved;
    return;
  }

  const q = encodeURIComponent(
    "name='TheShop' and mimeType='application/vnd.google-apps.folder' and trashed=false"
  );

  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`,
    {headers:{Authorization:"Bearer "+accessToken}}
  );

  const data = await res.json();

  if(data.files?.length){
    shopFolderId = data.files[0].id;
  } else {
    const create = await fetch(
      "https://www.googleapis.com/drive/v3/files",
      {
        method:"POST",
        headers:{
          Authorization:"Bearer "+accessToken,
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          name:"TheShop",
          mimeType:"application/vnd.google-apps.folder"
        })
      }
    );

    const d = await create.json();
    shopFolderId = d.id;
  }

  localStorage.setItem("SHOP_ROOT",shopFolderId);
}

/* ================= CAMERA ================= */

async function startCamera(){
  const video = el("video");

  const stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });

  video.srcObject = stream;
}

function capture(){

  const video = el("video");
  const canvas = el("canvas");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  canvas.getContext("2d").drawImage(video,0,0);

  imageData = canvas.toDataURL("image/png");

  el("popup").style.display="block";
}

/* ================= QR ================= */

function makeQR(text){
  return new Promise(res=>{
    const d=document.createElement("div");
    new QRCode(d,{text,width:120,height:120});

    setTimeout(()=>{
      const img=d.querySelector("img");

      const c=document.createElement("canvas");
      c.width=120;
      c.height=120;

      c.getContext("2d").drawImage(img,0,0);

      res(c.toDataURL("image/png"));
    },200);
  });
}

/* ================= MERGE ================= */

async function loadImage(src){
  return new Promise(r=>{
    const i=new Image();
    i.onload=()=>r(i);
    i.src=src;
  });
}

async function merge(item){

  const base = await loadImage(imageData);
  const qr = await loadImage(await makeQR(JSON.stringify(item)));

  const c=document.createElement("canvas");
  c.width=base.width;
  c.height=base.height;

  const ctx=c.getContext("2d");
  ctx.drawImage(base,0,0);

  const size=Math.min(c.width,c.height)*0.2;
  ctx.drawImage(qr,c.width-size-10,c.height-size-10,size,size);

  return c.toDataURL("image/png");
}

/* ================= CATEGORY ================= */

async function getCategoryFolder(name){

  const q = encodeURIComponent(
    `name='${name}' and '${shopFolderId}' in parents and trashed=false`
  );

  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`,
    {headers:{Authorization:"Bearer "+accessToken}}
  );

  const data = await res.json();

  if(data.files?.length) return data.files[0].id;

  const create = await fetch(
    "https://www.googleapis.com/drive/v3/files",
    {
      method:"POST",
      headers:{
        Authorization:"Bearer "+accessToken,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        name,
        parents:[shopFolderId],
        mimeType:"application/vnd.google-apps.folder"
      })
    }
  );

  const d = await create.json();
  return d.id;
}

/* ================= SAVE (FIXED CRASH HERE) ================= */

async function saveItem(){

  const nameVal = el("name").value;
  const priceVal = el("price").value;
  const categoryVal = el("category").value;

  if(!nameVal){
    alert("Name required");
    return;
  }

  const item = {
    id: crypto.randomUUID(),
    name: nameVal,
    price: priceVal,
    category: categoryVal
  };

  const folder = await getCategoryFolder(item.category);

  const img = await merge(item);
  const blob = await (await fetch(img)).blob();

  const safe = (item.name || "product")
    .replace(/\s+/g,"_")
    .replace(/[^a-zA-Z0-9_-]/g,"");

  await fetch(
    "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",
    {
      method:"POST",
      headers:{Authorization:"Bearer "+accessToken},
      body:(()=>{
        const f=new FormData();
        f.append("metadata",new Blob([JSON.stringify({
          name:safe+".png",
          parents:[folder]
        })],{type:"application/json"}));
        f.append("file",blob);
        return f;
      })()
    }
  );

  el("popup").style.display="none";
  loadDashboard();
}

/* ================= DASHBOARD ================= */

async function loadDashboard(){

  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q='${shopFolderId}'+in+parents&fields=files(id,name,mimeType)`,
    {headers:{Authorization:"Bearer "+accessToken}}
  );

  const data = await res.json();

  let html="<h3>Categories</h3><div class='grid'>";

  (data.files||[])
    .filter(f=>f.mimeType.includes("folder"))
    .forEach(f=>{
      html+=`<div class="card">📁 ${f.name}</div>`;
    });

  el("view").innerHTML=html;
}

function closePopup(){
  el("popup").style.display="none";
}

</script>

</body>
</html>
