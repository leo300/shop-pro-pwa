<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Shop Drive FIX</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
.container{padding:10px}
video,canvas{width:100%;border-radius:10px}
.btn{width:100%;padding:10px;margin-top:8px;border:none;border-radius:8px;background:#2563eb;color:white}
.popup{position:fixed;top:10%;left:5%;width:90%;background:white;color:black;padding:10px;border-radius:10px;display:none}
input,select{width:100%;padding:8px;margin:5px 0}
.card{background:#1f2937;padding:10px;border-radius:10px;margin-top:10px}
</style>
</head>

<body>

<div class="container">

<h3>📦 Smart Shop Drive (FIXED)</h3>

<input id="clientId" placeholder="Google Client ID"/>

<video id="video" autoplay playsinline></video>

<button class="btn" onclick="startCamera()">📷 Start Camera</button>
<button class="btn" onclick="capture()">📸 Capture Item</button>

<canvas id="canvas"></canvas>

<div id="view"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">

<h3>Item</h3>

<input id="name" placeholder="Name"/>
<input id="price" type="number" placeholder="Price"/>

<select id="category">
  <option>Food</option>
  <option>Drink</option>
  <option>Electronics</option>
</select>

<button class="btn" onclick="save()">SAVE + UPLOAD</button>
<button class="btn" onclick="popup.style.display='none'">Close</button>

</div>

<script>

let token=""
let imageData=""

/* ================= CAMERA ================= */

async function startCamera(){
  const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
  video.srcObject=stream
}

/* ================= CAPTURE ================= */

function capture(){
  const c=canvas
  const ctx=c.getContext("2d")

  c.width=video.videoWidth
  c.height=video.videoHeight

  ctx.drawImage(video,0,0)

  imageData=c.toDataURL("image/png")

  popup.style.display="block"
}

/* ================= GOOGLE AUTO AUTH (NO BUTTON) ================= */

function initGoogle(){
  google.accounts.id.initialize({
    client_id: clientId.value,
    callback: res=>token=res.credential
  })

  google.accounts.id.prompt() // auto popup (NO login button UI)
}

initGoogle()

/* ================= QR BURN INTO IMAGE ================= */

async function makeImage(item){

  const base=new Image()
  base.src=imageData

  await new Promise(r=>base.onload=r)

  const c=document.createElement("canvas")
  const ctx=c.getContext("2d")

  c.width=base.width
  c.height=base.height

  ctx.drawImage(base,0,0)

  const qr=document.createElement("canvas")

  new QRCode(qr,{
    text:JSON.stringify(item),
    width:120,
    height:120
  })

  await new Promise(r=>setTimeout(r,300))

  ctx.drawImage(qr,c.width-140,c.height-140,120,120)

  return c.toDataURL("image/png")
}

/* ================= DRIVE UPLOAD ================= */

async function upload(blob,name,folder){

  const form=new FormData()

  form.append("metadata",new Blob([JSON.stringify({
    name,
    parents:[folder]
  })],{type:"application/json"}))

  form.append("file",blob)

  return fetch(
    "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",
    {
      method:"POST",
      headers:{Authorization:"Bearer "+token},
      body:form
    }
  )
}

/* ================= SAVE ================= */

async function save(){

  const item={
    id:crypto.randomUUID(),
    name:name.value,
    price:+price.value,
    category:category.value
  }

  const finalImage=await makeImage(item)

  let folder=localStorage.getItem("f_"+item.category)

  if(!folder){

    const f=await fetch("https://www.googleapis.com/drive/v3/files",{
      method:"POST",
      headers:{
        "Authorization":"Bearer "+token,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        name:item.category,
        mimeType:"application/vnd.google-apps.folder"
      })
    }).then(r=>r.json())

    folder=f.id
    localStorage.setItem("f_"+item.category,folder)
  }

  await upload(new Blob([finalImage]),item.id+".png",folder)
  await upload(new Blob([JSON.stringify(item)]),item.id+".json",folder)

  let db=JSON.parse(localStorage.getItem("db")||"[]")
  db.push({...item,image:finalImage})
  localStorage.setItem("db",JSON.stringify(db))

  popup.style.display="none"
  render()
}

/* ================= DASHBOARD ================= */

function render(){

  const db=JSON.parse(localStorage.getItem("db")||"[]")
  const cats=[...new Set(db.map(i=>i.category))]

  let html="<h3>📊 Dashboard</h3>"

  cats.forEach(c=>{
    html+=`
      <div class="card" onclick="openCat('${c}')">
        <b>${c}</b><br/>
        ${db.filter(i=>i.category===c).length} items
      </div>
    `
  })

  view.innerHTML=html
}

/* ================= CATEGORY ================= */

function openCat(cat){

  const db=JSON.parse(localStorage.getItem("db")||"[]")
    .filter(i=>i.category===cat)

  let html=`<h3>${cat}</h3><button class="btn" onclick="render()">Back</button>`

  db.forEach(i=>{
    html+=`
      <div class="card">
        <b>${i.name}</b><br/>
        💰 ${i.price}
        <img src="${i.image}" style="width:100%;margin-top:5px;border-radius:10px"/>
      </div>
    `
  })

  view.innerHTML=html
}

render()

</script>

</body>
</html>
