<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shop POS Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* HEADER */
.header{
  padding:12px;
  background:#111827;
  font-weight:bold;
}

/* BUTTONS */
.btn{
  width:100%;
  padding:10px;
  margin-top:6px;
  border:none;
  border-radius:8px;
}

/* LAYOUT */
.container{padding:10px;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:10px;
}

.card{
  background:#1f2937;
  padding:10px;
  border-radius:10px;
}

/* QR SMALL */
.qr{
  width:50px;
  height:50px;
  background:white;
  padding:3px;
  border-radius:6px;
  float:right;
}

/* POPUP */
.popup{
  position:fixed;
  top:10%;
  left:5%;
  width:90%;
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  display:none;
  z-index:10;
}

input,select{
  width:100%;
  padding:8px;
  margin:5px 0;
}

/* CATEGORY BAR */
.bar{
  display:flex;
  overflow-x:auto;
  gap:8px;
  padding:10px;
}

.cat{
  background:#334155;
  padding:6px 10px;
  border-radius:20px;
  white-space:nowrap;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">📦 SHOP POS SYSTEM</div>

<div class="container">

<!-- CATEGORY BAR -->
<div class="bar" id="bar"></div>

<button class="btn" onclick="renderDashboard()">🏠 Dashboard</button>
<button class="btn" onclick="exportCSV()">📊 Export Excel</button>

<div id="view"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">

<h3>Item</h3>

<input id="name" placeholder="Name"/>
<input id="price" type="number" placeholder="Price"/>

<select id="category">
  <option>Food</option>
  <option>Drink</option>
  <option>Electronics</option>
</select>

<button class="btn" onclick="saveItem()">Save</button>
<button class="btn" onclick="closePopup()">Close</button>

</div>

<script>

/* ================= DB ================= */

function getDB(){
  return JSON.parse(localStorage.getItem("db")||"[]");
}

function saveDB(db){
  localStorage.setItem("db",JSON.stringify(db));
}

/* ================= DASHBOARD ================= */

function renderDashboard(){

  const db=getDB();
  const cats=[...new Set(db.map(i=>i.category))];

  const bar=document.getElementById("bar");
  bar.innerHTML="";

  cats.forEach(c=>{
    const d=document.createElement("div");
    d.className="cat";
    d.innerText=c;
    d.onclick=()=>openCategory(c);
    bar.appendChild(d);
  });

  if(cats.length) openCategory(cats[0]);
}

/* ================= CATEGORY ================= */

function openCategory(cat){

  const db=getDB().filter(i=>i.category===cat);

  let html=`<h3>${cat}</h3>
  <button class="btn" onclick="popup.style.display='block'">➕ Add</button>
  <div class="grid">`;

  db.forEach(item=>{

    const qrDiv=document.createElement("div");
    new QRCode(qrDiv,{
      text:JSON.stringify(item),
      width:50,
      height:50
    });

    html+=`
      <div class="card">
        <b>${item.name}</b><br/>
        💰 ${item.price}
        <div id="qr-${item.id}" class="qr"></div>

        <button onclick="editItem('${item.id}')">✏️</button>
        <button onclick="deleteItem('${item.id}')">🗑</button>
        <button onclick="addCart('${item.id}')">➕</button>
      </div>
    `;
  });

  html+="</div>";

  view.innerHTML=html;

  db.forEach(item=>{
    const el=document.getElementById("qr-"+item.id);
    if(el){
      new QRCode(el,{
        text:JSON.stringify(item),
        width:50,
        height:50
      });
    }
  });
}

/* ================= CRUD ================= */

function saveItem(){

  let db=getDB();

  db.push({
    id:crypto.randomUUID(),
    name:name.value,
    price:+price.value,
    category:category.value
  });

  saveDB(db);
  popup.style.display="none";
  renderDashboard();
}

function deleteItem(id){
  let db=getDB().filter(i=>i.id!==id);
  saveDB(db);
  renderDashboard();
}

function editItem(id){

  let db=getDB();
  let item=db.find(i=>i.id===id);

  name.value=item.name;
  price.value=item.price;
  category.value=item.category;

  popup.dataset.edit=id;
  popup.style.display="block";
}

/* ================= CART ================= */

let cart=[];

function addCart(id){
  let db=getDB();
  let item=db.find(i=>i.id===id);

  let f=cart.find(i=>i.id===id);
  if(f) f.qty++;
  else cart.push({...item,qty:1});

  alert("Added");
}

/* ================= EXPORT ================= */

function exportCSV(){

  let rows=[["Name","Price","Qty","Total"]];

  cart.forEach(i=>{
    rows.push([i.name,i.price,i.qty,i.price*i.qty]);
  });

  let csv=rows.map(r=>r.join(",")).join("\n");

  let blob=new Blob([csv],{type:"text/csv"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="sales.csv";
  a.click();
}

/* ================= INIT ================= */

renderDashboard();

function closePopup(){
  popup.style.display="none";
}

</script>

</body>
</html>
