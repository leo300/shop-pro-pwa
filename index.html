<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Shop Drive v4</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

header{
  padding:12px;
  background:#111827;
  font-weight:bold;
}

.container{padding:10px;}

video,canvas{
  width:100%;
  border-radius:10px;
}

.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  font-size:16px;
  -webkit-tap-highlight-color: transparent;
}

.btn:active{
  transform:scale(0.98);
  opacity:0.7;
}

.btn:disabled{
  opacity:0.5;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.card{
  background:#1f2937;
  padding:10px;
  border-radius:10px;
}

.popup{
  position:fixed;
  top:10%;
  left:5%;
  width:90%;
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  display:none;
  z-index:10;
}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
}
</style>
</head>

<body>

<header>📦 Smart Shop Drive v4 (Stable)</header>

<div class="container">

<input id="clientId" placeholder="Google Client ID"/>

<button id="connectBtn" class="btn" onclick="connectDrive()">
🔗 Connect Drive
</button>

<video id="video" autoplay playsinline></video>

<button class="btn" onclick="startCamera()">📷 Start Camera</button>
<button class="btn" onclick="capture()">📸 Capture</button>

<canvas id="canvas"></canvas>

<div id="view"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">

<h3>Add Product</h3>

<input id="name" placeholder="Product Name"/>
<input id="price" type="number" placeholder="Price"/>

<select id="category">
  <option>Food</option>
  <option>Drink</option>
  <option>Electronics</option>
</select>

<button class="btn" onclick="saveItem()">Save</button>
<button class="btn" onclick="popup.style.display='none'">Close</button>

</div>

<script>

/* ================= STATE ================= */

let accessToken = "";
let tokenClient;
let shopFolderId = "";
let connecting = false;

/* ================= CONNECT (FIXED SINGLE BUTTON FLOW) ================= */

async function connectDrive(){

  if(connecting) return;
  connecting = true;

  const btn = document.getElementById("connectBtn");
  btn.disabled = true;
  btn.innerText = "Connecting...";

  try{

    if(!tokenClient){

      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: clientId.value,
        scope: "https://www.googleapis.com/auth/drive.file",
        callback: async (res)=>{
          accessToken = res.access_token;
          await ensureShopFolder();
          await loadDashboard();
        }
      });
    }

    tokenClient.requestAccessToken();

  }catch(e){
    alert("Error: "+e.message);
  }

  setTimeout(()=>{
    btn.disabled = false;
    btn.innerText = "🔗 Connect Drive";
    connecting = false;
  },2000);
}

/* ================= SAFE ROOT (NO DUPLICATES FIXED) ================= */

async function ensureShopFolder(){

  // reuse cached
  let saved = localStorage.getItem("SHOP_ROOT");
  if(saved){
    shopFolderId = saved;
    return;
  }

  const q = encodeURIComponent(
    "name='TheShop' and mimeType='application/vnd.google-apps.folder' and trashed=false"
  );

  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`,
    {headers:{Authorization:"Bearer "+accessToken}}
  );

  const data = await res.json();

  if(data.files?.length){
    shopFolderId = data.files[0].id;
  }else{

    const create = await fetch(
      "https://www.googleapis.com/drive/v3/files",
      {
        method:"POST",
        headers:{
          Authorization:"Bearer "+accessToken,
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          name:"TheShop",
          mimeType:"application/vnd.google-apps.folder"
        })
      }
    );

    const d = await create.json();
    shopFolderId = d.id;
  }

  localStorage.setItem("SHOP_ROOT",shopFolderId);
}

/* ================= CAMERA ================= */

let imageData="";

async function startCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });
  video.srcObject = stream;
}

function capture(){
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  canvas.getContext("2d").drawImage(video,0,0);

  imageData = canvas.toDataURL("image/png");

  popup.style.display="block";
}

/* ================= QR ================= */

function makeQR(text){
  return new Promise(res=>{
    const d=document.createElement("div");
    new QRCode(d,{text,width:120,height:120});
    setTimeout(()=>{
      const img=d.querySelector("img");
      const c=document.createElement("canvas");
      c.width=120;c.height=120;
      c.getContext("2d").drawImage(img,0,0);
      res(c.toDataURL("image/png"));
    },200);
  });
}

/* ================= IMAGE MERGE ================= */

async function loadImage(src){
  return new Promise(r=>{
    const i=new Image();
    i.onload=()=>r(i);
    i.src=src;
  });
}

async function merge(item){

  const base = await loadImage(imageData);
  const qr = await loadImage(await makeQR(JSON.stringify(item)));

  const c=document.createElement("canvas");
  c.width=base.width;
  c.height=base.height;

  const ctx=c.getContext("2d");
  ctx.drawImage(base,0,0);

  const size = Math.min(c.width,c.height)*0.2;
  ctx.drawImage(qr,c.width-size-10,c.height-size-10,size,size);

  return c.toDataURL("image/png");
}

/* ================= CATEGORY ================= */

async function getCategoryFolder(name){

  const q = encodeURIComponent(
    `name='${name}' and '${shopFolderId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`
  );

  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`,
    {headers:{Authorization:"Bearer "+accessToken}}
  );

  const data = await res.json();

  if(data.files?.length) return data.files[0].id;

  const create = await fetch(
    "https://www.googleapis.com/drive/v3/files",
    {
      method:"POST",
      headers:{
        Authorization:"Bearer "+accessToken,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        name,
        parents:[shopFolderId],
        mimeType:"application/vnd.google-apps.folder"
      })
    }
  );

  const d = await create.json();
  return d.id;
}

/* ================= SAVE ================= */

async function saveItem(){

  const item = {
    id: crypto.randomUUID(),
    name: name.value,
    price: price.value,
    category: category.value
  };

  const folder = await getCategoryFolder(item.category);

  const img = await merge(item);
  const blob = await (await fetch(img)).blob();

  const safe = item.name.replace(/\s+/g,"_");

  await fetch(
    "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",
    {
      method:"POST",
      headers:{Authorization:"Bearer "+accessToken},
      body:(()=>{
        const f=new FormData();
        f.append("metadata",new Blob([JSON.stringify({
          name:safe+".png",
          parents:[folder]
        })],{type:"application/json"}));
        f.append("file",blob);
        return f;
      })()
    }
  );

  popup.style.display="none";
  loadDashboard();
}

/* ================= DASHBOARD ================= */

async function loadDashboard(){

  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q='${shopFolderId}'+in+parents&fields=files(id,name,mimeType)`,
    {headers:{Authorization:"Bearer "+accessToken}}
  );

  const data = await res.json();

  let html="<h3>📦 Categories</h3><div class='grid'>";

  (data.files||[])
    .filter(f=>f.mimeType.includes("folder"))
    .forEach(f=>{
      html+=`
        <div class="card" onclick="openCategory('${f.id}','${f.name}')">
          📁 ${f.name}
        </div>
      `;
    });

  view.innerHTML=html;
}

/* ================= CATEGORY VIEW ================= */

async function openCategory(id,name){

  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q='${id}'+in+parents&fields=files(id,name)`,
    {headers:{Authorization:"Bearer "+accessToken}}
  );

  const data = await res.json();

  let html=`<h3>${name}</h3><button class="btn" onclick="loadDashboard()">Back</button>`;

  (data.files||[]).forEach(f=>{
    html+=`
      <div class="card">
        📄 ${f.name}
        <button class="btn" onclick="deleteFile('${f.id}')">🗑 Delete</button>
      </div>
    `;
  });

  view.innerHTML=html;
}

/* ================= DELETE ================= */

async function deleteFile(id){

  await fetch(
    `https://www.googleapis.com/drive/v3/files/${id}`,
    {
      method:"DELETE",
      headers:{Authorization:"Bearer "+accessToken}
    }
  );

  loadDashboard();
}

</script>

</body>
</html>
