<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shop Pro Fixed</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* HEADER */
.header{
  padding:12px;
  font-size:18px;
  background:#111827;
}

/* BUTTONS MOBILE FIX */
.btn{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  font-size:14px;
}

/* LAYOUT */
.container{padding:10px;}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.card{
  background:#1f2937;
  padding:10px;
  border-radius:10px;
  font-size:14px;
}

/* QR IMAGE SMALL OVERLAY */
.item-box{
  position:relative;
}

.qr-mini{
  position:absolute;
  bottom:5px;
  right:5px;
  width:60px;
  height:60px;
  background:white;
  padding:3px;
  border-radius:6px;
}

/* POPUP */
.popup{
  position:fixed;
  top:10%;
  left:5%;
  width:90%;
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  display:none;
  z-index:10;
}

input,select{
  width:100%;
  padding:8px;
  margin:5px 0;
  font-size:14px;
}

/* CATEGORY BAR */
.cat-bar{
  display:flex;
  overflow-x:auto;
  gap:8px;
  padding:10px;
}

.cat{
  background:#334155;
  padding:8px 12px;
  border-radius:20px;
  white-space:nowrap;
  font-size:13px;
}
</style>
</head>

<body>

<div class="header">📦 Shop Pro Mobile POS</div>

<div class="container">

<!-- LOGIN -->
<button class="btn" id="loginBtn">🔐 Google Login</button>

<!-- DASHBOARD -->
<div class="cat-bar" id="cats"></div>

<!-- ITEMS -->
<div id="view"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">

<h3>Add Item</h3>

<input id="name" placeholder="Name"/>
<input id="price" type="number" placeholder="Price"/>
<select id="category">
  <option>Food</option>
  <option>Drink</option>
  <option>Electronics</option>
</select>

<button class="btn" onclick="saveItem()">Save</button>
<button class="btn" onclick="popup.style.display='none'">Close</button>

</div>

<script>

let token = "";
let currentCat = "Food";

/* ================= GOOGLE LOGIN (FIXED) ================= */

const CLIENT_ID = "YOUR_CLIENT_ID.apps.googleusercontent.com";

const loginBtn = document.getElementById("loginBtn");

window.onload = () => {
  renderCategories();
};

function initGIS(){
  google.accounts.id.initialize({
    client_id: CLIENT_ID,
    callback: handleLogin
  });

  loginBtn.onclick = () => google.accounts.id.prompt();
}

function handleLogin(res){
  token = res.credential;
  alert("Login success");
}

initGIS();

/* ================= DRIVE UPLOAD (FIXED) ================= */

async function uploadToDrive(blob, name, folderId){

  const meta = {
    name,
    parents:[folderId]
  };

  const form = new FormData();
  form.append("metadata", new Blob([JSON.stringify(meta)],{type:"application/json"}));
  form.append("file", blob);

  return await fetch(
    "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",
    {
      method:"POST",
      headers:{
        "Authorization":"Bearer "+token
      },
      body:form
    }
  ).then(r=>r.json());
}

/* ================= DATA ================= */

function getDB(){
  return JSON.parse(localStorage.getItem("db")||"[]");
}

function saveDB(d){
  localStorage.setItem("db",JSON.stringify(d));
}

/* ================= CATEGORIES ================= */

function renderCategories(){

  const db = getDB();
  const cats = [...new Set(db.map(i=>i.category))];

  if(cats.length===0) cats.push("Food");

  const bar = document.getElementById("cats");
  bar.innerHTML="";

  cats.forEach(c=>{
    const d=document.createElement("div");
    d.className="cat";
    d.innerText=c;
    d.onclick=()=>openCat(c);
    bar.appendChild(d);
  });

  openCat(cats[0]);
}

/* ================= CATEGORY VIEW ================= */

function openCat(cat){

  currentCat=cat;

  const db = getDB().filter(i=>i.category===cat);
  const view=document.getElementById("view");

  view.innerHTML=`
    <h3>${cat}</h3>
    <button class="btn" onclick="popup.style.display='block'">➕ Add</button>
    <div class="grid" id="grid"></div>
  `;

  const grid=document.getElementById("grid");

  db.forEach(item=>{

    const card=document.createElement("div");
    card.className="card item-box";

    const qr=document.createElement("div");
    new QRCode(qr,{
      text:JSON.stringify(item),
      width:60,
      height:60
    });

    card.innerHTML=`
      <b>${item.name}</b><br/>
      💰 ${item.price}
    `;

    qr.className="qr-mini";
    card.appendChild(qr);

    card.onclick=()=>addToCart(item);

    grid.appendChild(card);
  });
}

/* ================= CART ================= */

let cart=[];

function addToCart(item){

  let f=cart.find(x=>x.id===item.id);

  if(f) f.qty++;
  else cart.push({...item,qty:1});

  alert(item.name+" added");
}

/* ================= SAVE ITEM ================= */

function saveItem(){

  const item={
    id:crypto.randomUUID(),
    name:name.value,
    price:+price.value,
    category:category.value
  };

  const db=getDB();
  db.push(item);
  saveDB(db);

  popup.style.display="none";
  renderCategories();
}

</script>

</body>
</html>
