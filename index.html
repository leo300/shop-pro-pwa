<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Shop Drive v2</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

header{
  padding:12px;
  background:#111827;
  font-weight:bold;
}

.container{padding:10px;}

video,canvas{
  width:100%;
  border-radius:10px;
}

.btn{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.card{
  background:#1f2937;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

.popup{
  position:fixed;
  top:10%;
  left:5%;
  width:90%;
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  display:none;
  z-index:10;
}

input,select{
  width:100%;
  padding:8px;
  margin:5px 0;
}
</style>
</head>

<body>

<header>📦 Smart Shop Drive v2 (Stable)</header>

<div class="container">

<input id="clientId" placeholder="Google Client ID"/>

<button class="btn" onclick="initGoogle()">Init Google OAuth</button>
<button class="btn" onclick="login()">Get Access Token</button>

<video id="video" autoplay playsinline></video>

<button class="btn" onclick="startCamera()">📷 Start Camera</button>
<button class="btn" onclick="capture()">📸 Capture</button>

<canvas id="canvas"></canvas>

<div id="view"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">

<h3>Add Item</h3>

<input id="name" placeholder="Name"/>
<input id="price" type="number" placeholder="Price"/>

<select id="category">
  <option>Food</option>
  <option>Drink</option>
  <option>Electronics</option>
</select>

<button class="btn" onclick="saveItem()">Save & Upload</button>
<button class="btn" onclick="popup.style.display='none'">Close</button>

</div>

<script>

/* ================= TOKEN ================= */

let accessToken = "";

function setToken(t){ accessToken = t; }
function getToken(){ return accessToken; }

/* ================= GOOGLE AUTH ================= */

let tokenClient;

function initGoogle(){

  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: clientId.value,
    scope: "https://www.googleapis.com/auth/drive.file",
    callback: (resp) => {
      setToken(resp.access_token);
      console.log("TOKEN OK");
    }
  });

  alert("OAuth ready");
}

function login(){
  tokenClient.requestAccessToken();
}

/* ================= CAMERA ================= */

async function startCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });

  video.srcObject = stream;
}

/* ================= CAPTURE ================= */

let imageData = "";

function capture(){

  const c = canvas;
  const ctx = c.getContext("2d");

  c.width = video.videoWidth;
  c.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  imageData = c.toDataURL("image/png");

  popup.style.display = "block";
}

/* ================= QR GENERATOR ================= */

function makeQR(text){

  return new Promise(resolve=>{

    const temp = document.createElement("div");

    new QRCode(temp,{
      text,
      width:120,
      height:120
    });

    setTimeout(()=>{

      const img = temp.querySelector("img");

      const c = document.createElement("canvas");
      const ctx = c.getContext("2d");

      c.width = 120;
      c.height = 120;

      ctx.drawImage(img,0,0,120,120);

      resolve(c);

    },300);
  });
}

/* ================= EMBED QR INTO IMAGE ================= */

async function merge(item){

  const img = new Image();
  img.src = imageData;

  await new Promise(r=>img.onload=r);

  const c = document.createElement("canvas");
  const ctx = c.getContext("2d");

  c.width = img.width;
  c.height = img.height;

  ctx.drawImage(img,0,0);

  const qr = await makeQR(JSON.stringify(item));

  ctx.drawImage(qr,c.width-140,c.height-140,120,120);

  return c.toDataURL("image/png");
}

/* ================= DRIVE UPLOADER v2 ================= */

class DriveUploader {

  constructor(getToken){
    this.getToken = getToken;
    this.queue = [];
    this.running = false;
  }

  add(file,name,folder){
    this.queue.push({file,name,folder,tries:0});
    this.run();
  }

  async run(){

    if(this.running) return;
    this.running = true;

    while(this.queue.length){

      const job = this.queue[0];

      try{
        await this.upload(job);
        this.queue.shift();
      }catch(e){

        console.error(e);

        job.tries++;

        if(job.tries >= 3){
          this.queue.shift();
        }else{
          await new Promise(r=>setTimeout(r,2000));
        }
      }
    }

    this.running = false;
  }

  async upload({file,name,folder}){

    const token = this.getToken();
    if(!token) throw new Error("NO TOKEN");

    const meta = {
      name,
      parents:[folder]
    };

    const form = new FormData();

    form.append("metadata", new Blob([JSON.stringify(meta)],{
      type:"application/json"
    }));

    form.append("file", file);

    const res = await fetch(
      "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",
      {
        method:"POST",
        headers:{
          Authorization:"Bearer "+token
        },
        body:form
      }
    );

    if(!res.ok){
      throw new Error(await res.text());
    }

    return await res.json();
  }
}

const drive = new DriveUploader(getToken);

/* ================= FOLDER ================= */

async function getFolder(name){

  let id = localStorage.getItem("f_"+name);
  if(id) return id;

  const res = await fetch("https://www.googleapis.com/drive/v3/files",{
    method:"POST",
    headers:{
      "Authorization":"Bearer "+getToken(),
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      name,
      mimeType:"application/vnd.google-apps.folder"
    })
  });

  const data = await res.json();

  localStorage.setItem("f_"+name,data.id);

  return data.id;
}

/* ================= SAVE ITEM ================= */

async function saveItem(){

  const item = {
    id:crypto.randomUUID(),
    name:name.value,
    price:+price.value,
    category:category.value
  };

  const img = await merge(item);

  const folder = await getFolder(item.category);

  drive.add(new Blob([img]), item.id+".png", folder);
  drive.add(new Blob([JSON.stringify(item)]), item.id+".json", folder);

  let db = JSON.parse(localStorage.getItem("db")||"[]");
  db.push({...item,image:img});
  localStorage.setItem("db",JSON.stringify(db));

  popup.style.display="none";
  render();
}

/* ================= DASHBOARD ================= */

function render(){

  const db = JSON.parse(localStorage.getItem("db")||"[]");
  const cats = [...new Set(db.map(i=>i.category))];

  let html = "<h3>📊 Dashboard</h3><div class='grid'>";

  cats.forEach(c=>{
    html += `
      <div class="card" onclick="openCat('${c}')">
        <b>${c}</b><br/>
        ${db.filter(i=>i.category===c).length} items
      </div>
    `;
  });

  view.innerHTML = html;
}

/* ================= CATEGORY ================= */

function openCat(cat){

  const db = JSON.parse(localStorage.getItem("db")||"[]")
    .filter(i=>i.category===cat);

  let html = `
    <h3>${cat}</h3>
    <button class="btn" onclick="render()">Back</button>
  `;

  db.forEach(i=>{
    html += `
      <div class="card">
        <img src="${i.image}" style="width:100%;border-radius:10px"/>
        <b>${i.name}</b><br/>
        💰 ${i.price}
      </div>
    `;
  });

  view.innerHTML = html;
}

render();

</script>

</body>
</html>
