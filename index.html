<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scan + Drive POS</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.header{
  padding:12px;
  background:#111827;
}

.container{padding:10px;}

video{
  width:100%;
  border-radius:10px;
}

.btn{
  width:100%;
  padding:10px;
  margin-top:6px;
  border:none;
  border-radius:8px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.card{
  background:#1f2937;
  padding:10px;
  border-radius:10px;
  position:relative;
}

/* QR inside image corner */
.qr{
  position:absolute;
  bottom:5px;
  right:5px;
  width:60px;
  height:60px;
  background:white;
  padding:3px;
  border-radius:6px;
}

.popup{
  position:fixed;
  top:10%;
  left:5%;
  width:90%;
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  display:none;
  z-index:10;
}

input,select{
  width:100%;
  padding:8px;
  margin:5px 0;
}
</style>
</head>

<body>

<div class="header">📷 Scan + Drive POS</div>

<div class="container">

<button class="btn" id="loginBtn">🔐 Google Login</button>

<video id="video" autoplay></video>
<button class="btn" onclick="capture()">📸 Capture Item</button>

<canvas id="canvas" style="display:none;"></canvas>

<div id="view"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">

<h3>Item Form</h3>

<input id="name" placeholder="Name"/>
<input id="price" type="number" placeholder="Price"/>

<select id="category">
  <option>Food</option>
  <option>Drink</option>
  <option>Electronics</option>
</select>

<button class="btn" onclick="saveItem()">💾 Save + Upload</button>
<button class="btn" onclick="popup.style.display='none'">Close</button>

</div>

<script>

let token="";
let imageData="";

/* ================= GOOGLE LOGIN ================= */

const CLIENT_ID="YOUR_CLIENT_ID.apps.googleusercontent.com";

google.accounts.id.initialize({
  client_id:CLIENT_ID,
  callback:(res)=>{
    token=res.credential;
    alert("Logged in");
  }
});

document.getElementById("loginBtn").onclick=()=>{
  google.accounts.id.prompt();
};

/* ================= CAMERA ================= */

navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(stream=>{
  video.srcObject=stream;
});

/* ================= CAPTURE ================= */

function capture(){

  const canvas=document.getElementById("canvas");
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;

  canvas.getContext("2d").drawImage(video,0,0);

  imageData=canvas.toDataURL("image/png");

  popup.style.display="block";
}

/* ================= DRIVE UPLOAD ================= */

async function upload(blob,name,folderId){

  const form=new FormData();

  form.append("metadata",new Blob([JSON.stringify({
    name,
    parents:[folderId]
  })],{type:"application/json"}));

  form.append("file",blob);

  return await fetch(
    "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",
    {
      method:"POST",
      headers:{
        "Authorization":"Bearer "+token
      },
      body:form
    }
  ).then(r=>r.json());
}

/* ================= SAVE ================= */

async function saveItem(){

  const item={
    id:crypto.randomUUID(),
    name:name.value,
    price:+price.value,
    category:category.value
  };

  item.qrData=JSON.stringify(item);

  const imgBlob=await (await fetch(imageData)).blob();

  let folder=localStorage.getItem("folder_"+item.category);

  if(!folder){
    const f=await fetch("https://www.googleapis.com/drive/v3/files",{
      method:"POST",
      headers:{
        "Authorization":"Bearer "+token,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        name:item.category,
        mimeType:"application/vnd.google-apps.folder"
      })
    }).then(r=>r.json());

    folder=f.id;
    localStorage.setItem("folder_"+item.category,folder);
  }

  await upload(new File([imgBlob],item.id+".png"),item.id+".png",folder);

  await upload(new Blob([item.qrData],{type:"application/json"}),item.id+".json",folder);

  addToUI(item);
  popup.style.display="none";
}

/* ================= UI ================= */

function addToUI(item){

  const div=document.createElement("div");
  div.className="card";

  const qr=document.createElement("div");
  new QRCode(qr,{
    text:item.qrData,
    width:60,
    height:60
  });
  qr.className="qr";

  div.innerHTML=`
    <b>${item.name}</b><br/>
    💰 ${item.price}<br/>
    📂 ${item.category}
  `;

  div.appendChild(qr);
  view.appendChild(div);
}

</script>

</body>
</html>
