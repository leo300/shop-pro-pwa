<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Shop Drive v7</title>

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- FONT AWESOME -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  background:#0f172a;
  color:white;
}

header{
  background:#111827;
  padding:12px;
  text-align:center;
  font-weight:bold;
}

.card-dark{
  background:#1f2937;
  border-radius:12px;
  padding:10px;
  cursor:pointer;
}

.img-thumb{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}

video{
  width:100%;
  border-radius:12px;
}
</style>
</head>

<body>

<header>
  <i class="fa-solid fa-store"></i> Smart Shop Drive v7
</header>

<div class="container py-3">

<!-- CONNECT -->
<div class="mb-2">
  <input id="clientId" class="form-control" placeholder="Google Client ID">
</div>

<button class="btn btn-primary w-100 mb-2" onclick="connectDrive()">
  <i class="fa-solid fa-plug"></i> Connect Drive
</button>

<!-- CAMERA -->
<video id="video" autoplay playsinline></video>

<button class="btn btn-success w-100 mt-2" onclick="startCamera()">
  <i class="fa-solid fa-camera"></i> Start Camera
</button>

<button class="btn btn-warning w-100 mt-2" onclick="capture()">
  <i class="fa-solid fa-camera-retro"></i> Capture
</button>

<canvas id="canvas" style="display:none;"></canvas>

<hr>

<div id="view"></div>
</div>

<!-- ADD PRODUCT MODAL -->
<div class="modal fade" id="productModal">
  <div class="modal-dialog">
    <div class="modal-content text-dark">

      <div class="modal-header">
        <h5 class="modal-title">Add Product</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input id="name" class="form-control mb-2" placeholder="Product Name">
        <input id="price" class="form-control mb-2" type="number" placeholder="Price">

        <select id="category" class="form-select">
          <option>Food</option>
          <option>Drink</option>
          <option>Electronics</option>
        </select>

        <div id="qrBox" class="mt-3 text-center"></div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-primary" onclick="saveItem()">Save</button>
      </div>

    </div>
  </div>
</div>

<!-- IMAGE MODAL (FIXED FULLSCREEN) -->
<div class="modal fade" id="imgModal">
  <div class="modal-dialog modal-fullscreen">
    <div class="modal-content bg-black">

      <div class="modal-body p-0 d-flex align-items-center justify-content-center"
           onclick="closeImage()">

        <img id="modalImg" class="w-100 h-100 object-fit-contain">

      </div>

    </div>
  </div>
</div>

<!-- TOAST -->
<div class="position-fixed bottom-0 end-0 p-3">
  <div id="toast" class="toast text-bg-dark">
    <div class="toast-body" id="toastMsg"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const el = id => document.getElementById(id);

let accessToken="";
let tokenClient=null;
let shopFolderId="";
let imageData="";

let currentFolderId=null;
let currentFolderName=null;

/* TOAST */
function showToast(msg){
  el("toastMsg").innerText = msg;
  new bootstrap.Toast(el("toast")).show();
}

/* CONNECT DRIVE */
function connectDrive(){
  const clientId = el("clientId").value;
  if(!clientId) return showToast("Client ID required");

  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: "https://www.googleapis.com/auth/drive.file",
    callback: async (res)=>{
      accessToken = res.access_token;
      await ensureShopFolder();
      loadDashboard();
      showToast("Connected to Drive");
    }
  });

  tokenClient.requestAccessToken();
}

/* DRIVE FOLDER */
async function ensureShopFolder(){

  const saved = localStorage.getItem("SHOP_ROOT");
  if(saved){
    shopFolderId = saved;
    return;
  }

  const q = encodeURIComponent("name='TheShop' and mimeType='application/vnd.google-apps.folder' and trashed=false");

  const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`,{
    headers:{Authorization:"Bearer "+accessToken}
  });

  const data = await res.json();

  if(data.files?.length){
    shopFolderId = data.files[0].id;
  } else {
    const create = await fetch("https://www.googleapis.com/drive/v3/files",{
      method:"POST",
      headers:{
        Authorization:"Bearer "+accessToken,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        name:"TheShop",
        mimeType:"application/vnd.google-apps.folder"
      })
    });

    const d = await create.json();
    shopFolderId = d.id;
  }

  localStorage.setItem("SHOP_ROOT",shopFolderId);
}

/* CAMERA */
async function startCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
  el("video").srcObject = stream;
}

function capture(){
  const video = el("video");
  const canvas = el("canvas");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  canvas.getContext("2d").drawImage(video,0,0);

  imageData = canvas.toDataURL("image/png");

  new bootstrap.Modal(el("productModal")).show();
}

/* SAVE ITEM */
async function saveItem(){

  const name = el("name").value;
  const price = el("price").value;
  const category = el("category").value;

  if(!name || !price){
    return showToast("Fill all fields");
  }

  const data = {name,price,category};

  el("qrBox").innerHTML="";
  new QRCode(el("qrBox"),{
    text:JSON.stringify(data),
    width:150,
    height:150
  });

  showToast("Product saved (QR generated)");

  bootstrap.Modal.getInstance(el("productModal")).hide();
}

/* DASHBOARD */
async function loadDashboard(){

  currentFolderId=null;

  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q='${shopFolderId}'+in+parents&fields=files(id,name,mimeType,thumbnailLink,webContentLink)`,
    {headers:{Authorization:"Bearer "+accessToken}}
  );

  const data = await res.json();

  let html = `
    <div class="d-flex justify-content-between align-items-center mb-2">
      <h5 class="m-0">Categories</h5>
    </div>
    <div class="row g-2">
  `;

  (data.files||[])
    .filter(f=>f.mimeType.includes("folder"))
    .forEach(f=>{
      html+=`
        <div class="col-6">
          <div class="card-dark text-center" onclick="openCategory('${f.id}','${f.name}')">
            <i class="fa-solid fa-folder fa-2x"></i>
            <div>${f.name}</div>
          </div>
        </div>
      `;
    });

  html+="</div>";

  el("view").innerHTML = html;
}

/* CATEGORY */
async function openCategory(id,name){

  currentFolderId=id;
  currentFolderName=name;

  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q='${id}'+in+parents&fields=files(id,name,thumbnailLink,webContentLink)`,
    {headers:{Authorization:"Bearer "+accessToken}}
  );

  const data = await res.json();

  let html = `
    <div class="d-flex justify-content-between align-items-center mb-2">
      <button class="btn btn-sm btn-light" onclick="loadDashboard()">
        <i class="fa fa-arrow-left"></i> Back
      </button>
      <h6 class="m-0">${name}</h6>
    </div>

    <div class="row g-2">
  `;

  (data.files||[]).forEach(f=>{
    html+=`
      <div class="col-6">
        <div class="card-dark" onclick="openImage('${f.webContentLink || f.thumbnailLink}')">
          <img src="${f.thumbnailLink || ''}" class="img-thumb">
          <div>${f.name}</div>
        </div>
      </div>
    `;
  });

  html+="</div>";

  el("view").innerHTML = html;
}

/* IMAGE VIEW */
function openImage(src){
  el("modalImg").src = src;
  new bootstrap.Modal(el("imgModal")).show();
}

function closeImage(){
  bootstrap.Modal.getInstance(el("imgModal")).hide();
}

window.onload = loadDashboard;

</script>

</body>
</html>
