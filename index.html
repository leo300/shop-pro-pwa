<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Shop Drive</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.header{
  padding:12px;
  background:#111827;
}

.container{padding:10px;}

video, canvas{
  width:100%;
  border-radius:10px;
}

.btn{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.card{
  background:#1f2937;
  padding:10px;
  border-radius:10px;
}

.popup{
  position:fixed;
  top:10%;
  left:5%;
  width:90%;
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  display:none;
  z-index:10;
}

.qr{
  width:80px;
  height:80px;
  background:white;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="header">📦 Smart Shop Drive System</div>

<div class="container">

<!-- GOOGLE LOGIN -->
<input id="clientId" placeholder="Google Client ID"/>
<button class="btn" onclick="initGoogle()">Init Google</button>
<button class="btn" onclick="login()">Login</button>

<!-- CAMERA -->
<video id="video" autoplay playsinline></video>
<button class="btn" onclick="startCamera()">📷 Scan Product</button>
<button class="btn" onclick="capture()">📸 Capture</button>

<canvas id="canvas" style="display:none;"></canvas>

<!-- DASHBOARD -->
<div id="view"></div>

</div>

<!-- POPUP FORM -->
<div class="popup" id="popup">

<h3>Item Details</h3>

<input id="name" placeholder="Name"/>
<input id="price" type="number" placeholder="Price"/>

<select id="category">
  <option>Food</option>
  <option>Drink</option>
  <option>Electronics</option>
</select>

<button class="btn" onclick="saveItem()">Save to Drive</button>
<button class="btn" onclick="popup.style.display='none'">Close</button>

</div>

<script>

/* ================= GLOBAL ================= */

let token="";
let imageData="";

/* ================= CAMERA ================= */

async function startCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });
  video.srcObject = stream;
}

/* ================= CAPTURE ================= */

function capture(){

  const canvas=document.getElementById("canvas");
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;

  const ctx=canvas.getContext("2d");
  ctx.drawImage(video,0,0);

  imageData=canvas.toDataURL("image/png");

  popup.style.display="block";
}

/* ================= GOOGLE ================= */

function initGoogle(){
  google.accounts.id.initialize({
    client_id: clientId.value,
    callback: res => token = res.credential
  });

  alert("Google ready");
}

function login(){
  google.accounts.id.prompt();
}

/* ================= QR BURN INTO IMAGE ================= */

async function createFinalImage(item){

  const canvas=document.createElement("canvas");
  const ctx=canvas.getContext("2d");

  const img=new Image();
  img.src=imageData;

  await new Promise(r=>img.onload=r);

  canvas.width=img.width;
  canvas.height=img.height;

  ctx.drawImage(img,0,0);

  const qrCanvas=document.createElement("canvas");

  new QRCode(qrCanvas,{
    text:JSON.stringify(item),
    width:120,
    height:120
  });

  await new Promise(r=>setTimeout(r,300));

  ctx.drawImage(qrCanvas,canvas.width-140,canvas.height-140,120,120);

  return canvas.toDataURL("image/png");
}

/* ================= DRIVE UPLOAD ================= */

async function upload(blob,name,folderId){

  const form=new FormData();

  form.append("metadata",new Blob([JSON.stringify({
    name,
    parents:[folderId]
  })],{type:"application/json"}));

  form.append("file",blob);

  return fetch(
    "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",
    {
      method:"POST",
      headers:{ Authorization:"Bearer "+token },
      body:form
    }
  );
}

/* ================= SAVE ITEM ================= */

async function saveItem(){

  const item={
    id:crypto.randomUUID(),
    name:name.value,
    price:+price.value,
    category:category.value
  };

  const finalImage = await createFinalImage(item);

  let folder = localStorage.getItem("folder_"+item.category);

  if(!folder){

    const f = await fetch("https://www.googleapis.com/drive/v3/files",{
      method:"POST",
      headers:{
        "Authorization":"Bearer "+token,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        name:item.category,
        mimeType:"application/vnd.google-apps.folder"
      })
    }).then(r=>r.json());

    folder=f.id;
    localStorage.setItem("folder_"+item.category,folder);
  }

  await upload(new Blob([finalImage]), item.id+".png", folder);
  await upload(new Blob([JSON.stringify(item)]), item.id+".json", folder);

  saveLocal(item, finalImage);

  popup.style.display="none";
  render();
}

/* ================= LOCAL DB ================= */

function saveLocal(item,img){
  let db=JSON.parse(localStorage.getItem("db")||"[]");
  db.push({...item,image:img});
  localStorage.setItem("db",JSON.stringify(db));
}

/* ================= DASHBOARD ================= */

function render(){

  const db=JSON.parse(localStorage.getItem("db")||"[]");
  const cats=[...new Set(db.map(i=>i.category))];

  let html=`<h3>📊 Dashboard</h3><div class="grid">`;

  cats.forEach(c=>{
    html+=`
      <div class="card" onclick="openCategory('${c}')">
        <b>${c}</b><br/>
        ${db.filter(i=>i.category===c).length} items
      </div>
    `;
  });

  view.innerHTML=html;
}

/* ================= CATEGORY VIEW ================= */

function openCategory(cat){

  const db=JSON.parse(localStorage.getItem("db")||"[]")
    .filter(i=>i.category===cat);

  let html=`<h3>${cat}</h3><button class="btn" onclick="render()">Back</button>`;

  db.forEach(i=>{
    html+=`
      <div class="card">
        <b>${i.name}</b><br/>
        💰 ${i.price}
        <img src="${i.image}" style="width:100%;margin-top:5px;border-radius:10px"/>
      </div>
    `;
  });

  view.innerHTML=html;
}

render();

</script>

</body>
</html>
