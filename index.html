<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shop Pro Drive System</title>

<link rel="manifest" href="manifest.json"/>

<script src="https://apis.google.com/js/api.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #0f172a;
  color: white;
}

.header {
  padding: 15px;
  background: #111827;
  font-size: 20px;
  font-weight: bold;
}

.container { padding: 12px; }

.card {
  background: #1f2937;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}

.btn {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.primary { background: #3b82f6; color: white; }
.success { background: #22c55e; color: white; }
.danger { background: #ef4444; color: white; }

input, select {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
  border-radius: 6px;
  border: none;
}

video { width: 100%; border-radius: 10px; }

.popup {
  position: fixed;
  top: 10%;
  left: 5%;
  width: 90%;
  background: white;
  color: black;
  padding: 12px;
  border-radius: 10px;
  display: none;
  z-index: 10;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px;
}

.qr {
  background: white;
  padding: 5px;
  border-radius: 8px;
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="header">☁️ Shop Pro Drive System</div>

<div class="container">

<!-- CLIENT ID -->
<div class="card">
  <h3>🔑 Google Client ID</h3>
  <input id="clientIdInput" placeholder="Paste YOUR_CLIENT_ID here">
  <button class="btn primary" onclick="saveClientId()">Save Client ID</button>
</div>

<button class="btn success" onclick="initGoogle()">🔐 Init Google</button>
<button class="btn primary" onclick="signIn()">🔓 Login</button>

<!-- CAMERA -->
<video id="video" autoplay></video>
<button class="btn primary" onclick="capture()">📸 Scan Item</button>

<canvas id="canvas" style="display:none;"></canvas>

<!-- POPUP -->
<div class="popup" id="popup">

<h3>✏️ Item Form</h3>

<input id="name" placeholder="Name">
<input id="price" type="number" placeholder="Price">
<input id="discount" type="number" placeholder="Discount %">

<select id="category">
  <option>Food</option>
  <option>Drink</option>
  <option>Electronics</option>
</select>

<button class="btn primary" onclick="saveItem()">💾 Save to Drive</button>
<button class="btn danger" onclick="closePopup()">Close</button>

</div>

<!-- OUTPUT -->
<div id="list"></div>

</div>

<script>
let imageData = "";
let accessToken = "";

/* ================= CLIENT ID ================= */

function saveClientId() {
  localStorage.setItem("google_client_id", clientIdInput.value);
  alert("Saved!");
}

function getClientId() {
  return localStorage.getItem("google_client_id");
}

window.onload = () => {
  const saved = getClientId();
  if (saved) clientIdInput.value = saved;
};

/* ================= GOOGLE INIT ================= */

function initGoogle() {

  const CLIENT_ID = getClientId();

  if (!CLIENT_ID) {
    alert("Enter Client ID first");
    return;
  }

  gapi.load("client:auth2", () => {
    gapi.auth2.init({
      client_id: CLIENT_ID
    });
  });

  alert("Google Ready");
}

/* ================= LOGIN ================= */

async function signIn() {
  const auth = await gapi.auth2.getAuthInstance().signIn();
  accessToken = auth.getAuthResponse().access_token;
  alert("Logged in!");
}

/* ================= CAMERA ================= */

navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream => video.srcObject = stream);

/* ================= CAPTURE ================= */

function capture() {

  const canvas = document.getElementById("canvas");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);

  imageData = canvas.toDataURL("image/png");

  popup.style.display = "block";
}

/* ================= DRIVE FOLDER ================= */

async function createFolder(name) {

  const res = await fetch("https://www.googleapis.com/drive/v3/files", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + accessToken,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name,
      mimeType: "application/vnd.google-apps.folder"
    })
  });

  return await res.json();
}

/* ================= UPLOAD ================= */

async function uploadFile(blob, name, folderId) {

  const form = new FormData();

  form.append("metadata", new Blob([JSON.stringify({
    name,
    parents: [folderId]
  })], { type: "application/json" }));

  form.append("file", blob);

  const res = await fetch(
    "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",
    {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + accessToken
      },
      body: form
    }
  );

  return await res.json();
}

/* ================= SAVE ITEM ================= */

async function saveItem() {

  const item = {
    id: crypto.randomUUID(),
    name: name.value,
    price: Number(price.value),
    discount: Number(discount.value),
    category: category.value
  };

  item.finalPrice =
    item.price - (item.price * item.discount / 100);

  item.qrData = JSON.stringify(item);

  const imageBlob = await (await fetch(imageData)).blob();

  let folderId = localStorage.getItem("folder_" + item.category);

  if (!folderId) {
    const f = await createFolder(item.category);
    folderId = f.id;
    localStorage.setItem("folder_" + item.category, folderId);
  }

  // upload image
  const imgFile = new File([imageBlob], item.id + ".png");
  await uploadFile(imgFile, item.id + ".png", folderId);

  // upload JSON
  const jsonBlob = new Blob([item.qrData], {
    type: "application/json"
  });

  await uploadFile(jsonBlob, item.id + ".json", folderId);

  // local DB
  let db = JSON.parse(localStorage.getItem("db") || "[]");
  db.push(item);
  localStorage.setItem("db", JSON.stringify(db));

  render();
  closePopup();
}

/* ================= RENDER ================= */

function render() {

  const list = document.getElementById("list");
  list.innerHTML = "";

  let db = JSON.parse(localStorage.getItem("db") || "[]");

  const grid = document.createElement("div");
  grid.className = "grid";

  db.forEach(item => {

    const card = document.createElement("div");
    card.className = "card";

    const qr = document.createElement("div");
    qr.className = "qr";
    new QRCode(qr, item.qrData);

    card.innerHTML = `
      <b>${item.name}</b><br/>
      💰 ${item.finalPrice}<br/>
      📂 ${item.category}
    `;

    card.appendChild(qr);
    grid.appendChild(card);
  });

  list.appendChild(grid);
}

render();

/* ================= POPUP ================= */

function closePopup() {
  popup.style.display = "none";
}
</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
