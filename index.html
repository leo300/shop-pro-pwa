<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Shop Drive FIX PRO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{background:#0f172a;color:white;}
header{background:#111827;padding:12px;text-align:center;font-weight:bold;}

.card-dark{
  background:#1f2937;
  border-radius:12px;
  padding:10px;
  cursor:pointer;
  transition:0.2s;
}
.card-dark:hover{background:#374151;}

.img-thumb{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

.topbar{
  display:flex;
  gap:10px;
  align-items:center;
  margin-bottom:10px;
}

.hidden{display:none;}
</style>
</head>

<body>

<header>
  <i class="fa-solid fa-store"></i> Smart Shop Drive PRO FIX
</header>

<div class="container py-3">

<!-- CONNECT -->
<div class="topbar">
  <button id="backBtn" class="btn btn-warning hidden" onclick="goBack()">
    <i class="fa fa-arrow-left"></i>
  </button>

  <input id="clientId" class="form-control" placeholder="Google Client ID">
  <button class="btn btn-primary" onclick="connectDrive()">
    <i class="fa fa-plug"></i>
  </button>
</div>

<!-- CAMERA -->
<video id="video" autoplay playsinline class="w-100 rounded mb-2"></video>

<button class="btn btn-success w-100 mb-2" onclick="startCamera()">
  <i class="fa fa-camera"></i> Start Camera
</button>

<button class="btn btn-warning w-100 mb-3" onclick="capture()">
  <i class="fa fa-camera-retro"></i> Capture
</button>

<canvas id="canvas" style="display:none;"></canvas>

<div id="view"></div>

</div>

<!-- MODAL -->
<div class="modal fade" id="modal">
  <div class="modal-dialog">
    <div class="modal-content text-dark">

      <div class="modal-header">
        <h5 class="modal-title">Add Product</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input id="name" class="form-control mb-2" placeholder="Product Name">
      </div>

      <div class="modal-footer">
        <button class="btn btn-primary" onclick="saveItem()">Save</button>
      </div>

    </div>
  </div>
</div>

<!-- IMAGE PREVIEW -->
<div class="modal fade" id="imgModal">
  <div class="modal-dialog modal-fullscreen">
    <div class="modal-content bg-black">
      <img id="previewImg" class="w-100 h-100 object-fit-contain">
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const el = id => document.getElementById(id);

let token="";
let rootFolder="";
let currentFolder=null;
let stack=[];
let imageData="";

/* NAV UI */
function updateNav(){
  el("backBtn").classList.toggle("hidden", stack.length===0);
}

/* CONNECT */
function connectDrive(){
  const clientId = el("clientId").value;
  if(!clientId) return alert("Client ID required");

  const client = google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: "https://www.googleapis.com/auth/drive.file",
    callback: async (res)=>{
      token = res.access_token;
      await initRoot();
      loadRoot();
    }
  });

  client.requestAccessToken();
}

/* ROOT */
async function initRoot(){

  const q = encodeURIComponent(
    "name='TheShop' and mimeType='application/vnd.google-apps.folder' and trashed=false"
  );

  const r = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`,
    {headers:{Authorization:"Bearer "+token}}
  );

  const d = await r.json();

  if(d.files?.length){
    rootFolder = d.files[0].id;
  } else {
    const c = await fetch("https://www.googleapis.com/drive/v3/files",{
      method:"POST",
      headers:{
        Authorization:"Bearer "+token,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        name:"TheShop",
        mimeType:"application/vnd.google-apps.folder"
      })
    });

    const res = await c.json();
    rootFolder = res.id;
  }
}

/* LOAD ROOT */
async function loadRoot(){
  stack=[];
  openFolder(rootFolder,"Categories",true);
}

/* OPEN FOLDER */
async function openFolder(id,name,isRoot=false){

  currentFolder=id;
  if(!isRoot) stack.push(id);
  updateNav();

  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q='${id}'+in+parents&fields=files(id,name,mimeType)`,
    {headers:{Authorization:"Bearer "+token}}
  );

  const data = await res.json();

  let html=`<h5>${name}</h5><div class="row g-2">`;

  (data.files||[]).forEach(f=>{

    if(f.mimeType.includes("folder")){
      html+=`
        <div class="col-6">
          <div class="card-dark text-center" onclick="openFolder('${f.id}','${f.name}')">
            <i class="fa fa-folder fa-2x"></i>
            <div>${f.name}</div>
          </div>
        </div>`;
    } else {

      // FIX: ALWAYS reliable image loading
      const imgUrl = `https://www.googleapis.com/drive/v3/files/${f.id}?alt=media`;

      html+=`
        <div class="col-6">
          <div class="card-dark" onclick="preview('${imgUrl}')">
            <img class="img-thumb" src="${imgUrl}">
            <div class="text-center mt-1 small">${f.name}</div>
          </div>
        </div>`;
    }
  });

  html+="</div>";
  el("view").innerHTML=html;
}

/* BACK */
function goBack(){
  if(stack.length===0) return;

  stack.pop();
  const prev = stack[stack.length-1];

  if(!prev){
    loadRoot();
  } else {
    openFolder(prev,"Back",true);
  }
}

/* CAMERA */
async function startCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
  el("video").srcObject=stream;
}

function capture(){
  const v=el("video"),c=el("canvas");

  c.width=v.videoWidth;
  c.height=v.videoHeight;

  c.getContext("2d").drawImage(v,0,0);

  imageData=c.toDataURL("image/png");

  new bootstrap.Modal(el("modal")).show();
}

/* SAVE */
async function saveItem(){

  const name = el("name").value;
  if(!name || !currentFolder) return alert("Missing data");

  const blob = await (await fetch(imageData)).blob();

  const meta = {
    name:name+".png",
    parents:[currentFolder]
  };

  const form = new FormData();
  form.append("metadata", new Blob([JSON.stringify(meta)],{type:"application/json"}));
  form.append("file", blob);

  await fetch(
    "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",
    {
      method:"POST",
      headers:{Authorization:"Bearer "+token},
      body:form
    }
  );

  bootstrap.Modal.getInstance(el("modal")).hide();
  openFolder(currentFolder,"Updated",true);
}

/* PREVIEW */
function preview(src){
  el("previewImg").src=src;
  new bootstrap.Modal(el("imgModal")).show();
}

</script>

</body>
</html>
