<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Shop Drive CLEAN</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body{background:#0f172a;color:white;}
header{background:#111827;padding:12px;text-align:center;font-weight:bold;}

.topbar{
  display:none;
  gap:10px;
  align-items:center;
  margin-bottom:10px;
}

.card-dark{
  background:#1f2937;
  border-radius:10px;
  padding:10px;
  cursor:pointer;
}

.card-dark:hover{background:#374151;}

img.thumb{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}
</style>
</head>

<body>

<header>Smart Shop Drive CLEAN</header>

<div class="container py-3">

<!-- CONNECT -->
<input id="clientId" class="form-control mb-2" placeholder="Google Client ID">
<button class="btn btn-primary w-100 mb-3" onclick="connectDrive()">Connect Drive</button>

<!-- NAVBAR (hidden until connected) -->
<div class="topbar" id="topbar">
  <button id="backBtn" class="btn btn-warning" onclick="goBack()" style="display:none;">
    <i class="fa fa-arrow-left"></i> Back
  </button>
</div>

<video id="video" autoplay playsinline class="w-100 mb-2 rounded"></video>

<button class="btn btn-success w-100 mb-2" onclick="startCamera()">Start Camera</button>
<button class="btn btn-warning w-100 mb-3" onclick="capture()">Capture</button>

<canvas id="canvas" style="display:none;"></canvas>

<div id="view"></div>

</div>

<!-- MODAL -->
<div class="modal fade" id="modal">
  <div class="modal-dialog">
    <div class="modal-content text-dark">
      <div class="modal-header">
        <h5>Add Item</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input id="name" class="form-control mb-2" placeholder="Name">
      </div>

      <div class="modal-footer">
        <button class="btn btn-primary" onclick="saveItem()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- IMAGE -->
<div class="modal fade" id="imgModal">
  <div class="modal-dialog modal-fullscreen">
    <div class="modal-content bg-black">
      <img id="previewImg" class="w-100 h-100 object-fit-contain">
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const el = id => document.getElementById(id);

let token="";
let root="";
let current=null;
let stack=[];

/* UI CONTROL */
function updateNav(){
  const topbar = el("topbar");
  const backBtn = el("backBtn");

  if(!token){
    topbar.style.display="none";
    return;
  }

  topbar.style.display="flex";

  backBtn.style.display = stack.length > 0 ? "block" : "none";
}

/* CONNECT */
function connectDrive(){
  const clientId = el("clientId").value;
  if(!clientId) return alert("Client ID required");

  const client = google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: "https://www.googleapis.com/auth/drive.file",
    callback: async (res)=>{
      token = res.access_token;
      await initRoot();
      updateNav();
      loadRoot();
    }
  });

  client.requestAccessToken();
}

/* ROOT */
async function initRoot(){

  const q = encodeURIComponent("name='TheShop' and mimeType='application/vnd.google-apps.folder' and trashed=false");

  const r = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`,{
    headers:{Authorization:"Bearer "+token}
  });

  const d = await r.json();

  if(d.files?.length){
    root = d.files[0].id;
  } else {
    const c = await fetch("https://www.googleapis.com/drive/v3/files",{
      method:"POST",
      headers:{
        Authorization:"Bearer "+token,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        name:"TheShop",
        mimeType:"application/vnd.google-apps.folder"
      })
    });

    const res = await c.json();
    root = res.id;
  }
}

/* LOAD ROOT */
async function loadRoot(){
  stack=[];
  current=root;
  await openFolder(root,"Categories",true);
}

/* OPEN FOLDER */
async function openFolder(id,name,isRoot=false){

  if(!isRoot) stack.push(current);
  current=id;

  updateNav();

  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q='${id}'+in+parents&fields=files(id,name,mimeType,thumbnailLink)`,
    {headers:{Authorization:"Bearer "+token}}
  );

  const data = await res.json();

  let html = `<h5>${name}</h5><div class="row g-2">`;

  data.files.forEach(f=>{
    if(f.mimeType.includes("folder")){
      html += `
        <div class="col-6">
          <div class="card-dark text-center" onclick="openFolder('${f.id}','${f.name}')">
            <i class="fa fa-folder fa-2x"></i>
            <div>${f.name}</div>
          </div>
        </div>`;
    } else {
      html += `
        <div class="col-6">
          <div class="card-dark" onclick="preview('${f.id}')">
            <img class="thumb" src="${f.thumbnailLink || ''}">
            <div class="text-center">${f.name}</div>
          </div>
        </div>`;
    }
  });

  html += "</div>";

  el("view").innerHTML = html;
}

/* BACK */
function goBack(){
  if(stack.length===0) return;

  const prev = stack.pop();
  openFolder(prev,"Back");
}

/* CAMERA */
async function startCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
  el("video").srcObject = stream;
}

function capture(){
  const v=el("video"),c=el("canvas");

  c.width=v.videoWidth;
  c.height=v.videoHeight;

  c.getContext("2d").drawImage(v,0,0);

  imageData=c.toDataURL("image/png");

  new bootstrap.Modal(el("modal")).show();
}

/* SAVE */
async function saveItem(){

  const name = el("name").value;
  if(!current) return alert("Open folder first");

  const blob = await (await fetch(imageData)).blob();

  const meta = {
    name:name+".png",
    parents:[current]
  };

  const form = new FormData();
  form.append("metadata", new Blob([JSON.stringify(meta)],{type:"application/json"}));
  form.append("file", blob);

  await fetch(
    "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",
    {
      method:"POST",
      headers:{Authorization:"Bearer "+token},
      body:form
    }
  );

  bootstrap.Modal.getInstance(el("modal")).hide();

  openFolder(current,"Updated");
}

/* PREVIEW */
function preview(id){
  fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`,{
    headers:{Authorization:"Bearer "+token}
  })
  .then(r=>r.blob())
  .then(b=>{
    el("previewImg").src=URL.createObjectURL(b);
    new bootstrap.Modal(el("imgModal")).show();
  });
}

</script>

</body>
</html>
