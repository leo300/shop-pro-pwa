<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Shop Drive FIXED</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

header{
  padding:12px;
  background:#111827;
  font-weight:bold;
}

.container{padding:10px;}

video,canvas{
  width:100%;
  border-radius:10px;
}

.btn{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.card{
  background:#1f2937;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

.popup{
  position:fixed;
  top:10%;
  left:5%;
  width:90%;
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  display:none;
  z-index:10;
}

input,select{
  width:100%;
  padding:8px;
  margin:5px 0;
}

img{
  width:100%;
  border-radius:10px;
}
</style>
</head>

<body>

<header>📦 Smart Shop Drive</header>

<div class="container">

<input id="clientId" placeholder="Google Client ID"/>

<button class="btn" onclick="initGoogle()">Init Google OAuth</button>
<button class="btn" onclick="login()">Connect Drive</button>

<video id="video" autoplay playsinline></video>

<button class="btn" onclick="startCamera()">📷 Start Camera</button>
<button class="btn" onclick="capture()">📸 Capture Item</button>

<canvas id="canvas"></canvas>

<div id="view"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">

<h3>Add Product</h3>

<input id="name" placeholder="Product Name"/>
<input id="price" type="number" placeholder="Price"/>

<select id="category">
  <option>Food</option>
  <option>Drink</option>
  <option>Electronics</option>
</select>

<button class="btn" onclick="saveItem()">Save to Drive</button>
<button class="btn" onclick="popup.style.display='none'">Close</button>

</div>

<script>

/* ================= AUTH ================= */

let accessToken = "";
let tokenClient = null;

function initGoogle(){

  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: clientId.value,
    scope: "https://www.googleapis.com/auth/drive.file",
    callback: (res)=>{
      accessToken = res.access_token;
      ensureShopFolder();
      loadDashboard();
    }
  });

  alert("Google OAuth ready");
}

function login(){
  tokenClient.requestAccessToken();
}

/* ================= CAMERA ================= */

let imageData = "";

async function startCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });

  video.srcObject = stream;
}

function capture(){

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video,0,0);

  imageData = canvas.toDataURL("image/png");

  popup.style.display="block";
}

/* ================= QR ================= */

function makeQR(text){
  return new Promise(res=>{
    const div=document.createElement("div");

    new QRCode(div,{
      text,
      width:120,
      height:120
    });

    setTimeout(()=>{
      const img=div.querySelector("img");

      const c=document.createElement("canvas");
      c.width=120;
      c.height=120;

      c.getContext("2d").drawImage(img,0,0);

      res(c.toDataURL("image/png"));
    },200);
  });
}

/* ================= IMAGE MERGE ================= */

async function merge(item){

  const img=new Image();
  img.src=imageData;
  await new Promise(r=>img.onload=r);

  const c=document.createElement("canvas");
  c.width=img.width;
  c.height=img.height;

  const ctx=c.getContext("2d");
  ctx.drawImage(img,0,0);

  const qr=await makeQR(JSON.stringify(item));

  const qrImg=new Image();
  qrImg.src=qr;
  await new Promise(r=>qrImg.onload=r);

  ctx.drawImage(qrImg,c.width-140,c.height-140,120,120);

  return c.toDataURL("image/png");
}

/* ================= DRIVE ROOT ================= */

let shopFolderId = "";

async function ensureShopFolder(){

  if(shopFolderId) return shopFolderId;

  const res = await fetch(
    "https://www.googleapis.com/drive/v3/files",
    {
      method:"POST",
      headers:{
        Authorization:"Bearer "+accessToken,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        name:"TheShop",
        mimeType:"application/vnd.google-apps.folder"
      })
    }
  );

  const data = await res.json();
  shopFolderId = data.id;

  return shopFolderId;
}

/* ================= CATEGORY FOLDER (NO DUPLICATES FIXED) ================= */

async function getCategoryFolder(name){

  const q = encodeURIComponent(
    `name='${name}' and '${shopFolderId}' in parents and mimeType='application/vnd.google-apps.folder'`
  );

  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`,
    {headers:{Authorization:"Bearer "+accessToken}}
  );

  const data = await res.json();

  if(data.files && data.files.length > 0){
    return data.files[0].id;
  }

  const create = await fetch(
    "https://www.googleapis.com/drive/v3/files",
    {
      method:"POST",
      headers:{
        Authorization:"Bearer "+accessToken,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        name,
        mimeType:"application/vnd.google-apps.folder",
        parents:[shopFolderId]
      })
    }
  );

  const d = await create.json();
  return d.id;
}

/* ================= SAFE UPLOAD ================= */

async function upload(blob,name,folder){

  const form=new FormData();

  form.append("metadata",new Blob([JSON.stringify({
    name,
    parents:[folder]
  })],{type:"application/json"}));

  form.append("file",blob);

  return fetch(
    "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",
    {
      method:"POST",
      headers:{Authorization:"Bearer "+accessToken},
      body:form
    }
  );
}

/* ================= SAVE ITEM ================= */

async function saveItem(){

  const nameVal = document.getElementById("name").value;
  const priceVal = document.getElementById("price").value;
  const categoryVal = document.getElementById("category").value;

  if(!nameVal) return alert("Name required");

  const item = {
    id: crypto.randomUUID(),
    name: nameVal,
    price: priceVal,
    category: categoryVal
  };

  const folder = await getCategoryFolder(categoryVal);

  const img = await merge(item);
  const blob = await (await fetch(img)).blob();

  const safeName = nameVal
    .replace(/\s+/g,"_")
    .replace(/[^a-zA-Z0-9_-]/g,"");

  await upload(blob, safeName + ".png", folder);

  popup.style.display = "none";

  loadDashboard();
}

/* ================= DASHBOARD ================= */

async function loadDashboard(){

  if(!shopFolderId) return;

  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q='${shopFolderId}'+in+parents&fields=files(id,name,mimeType)`,
    {headers:{Authorization:"Bearer "+accessToken}}
  );

  const data = await res.json();

  let html = "<h3>📦 Categories</h3><div class='grid'>";

  (data.files||[])
    .filter(f=>f.mimeType.includes("folder"))
    .forEach(f=>{
      html += `
        <div class="card">
          📁 ${f.name}
        </div>
      `;
    });

  view.innerHTML = html;
}

</script>

</body>
</html>
