<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Shop Drive v6</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* HEADER */
header{
  padding:14px;
  background:#111827;
  font-weight:bold;
  text-align:center;
}

/* CONTAINER */
.container{padding:12px;}

/* INPUT FIX (IMPORTANT) */
input{
  width:100%;
  padding:14px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  font-size:16px;
  box-sizing:border-box;
}

/* BUTTON */
.btn{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  font-size:16px;
}

.btn:active{
  transform:scale(0.98);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:10px;
}

/* CARD */
.card{
  background:#1f2937;
  padding:10px;
  border-radius:12px;
  cursor:pointer;
  text-align:center;
  font-size:14px;
}

/* IMAGE CARD */
.imgCard{
  background:#1f2937;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
}

.imgCard img{
  width:100%;
  height:140px;
  object-fit:cover;
}

/* POPUP */
.popup{
  position:fixed;
  top:10%;
  left:5%;
  width:90%;
  background:white;
  color:black;
  padding:10px;
  border-radius:12px;
  display:none;
  z-index:10;
}

/* FULLSCREEN VIEW */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal img{
  width:90%;
  max-height:90%;
  object-fit:contain;
}

/* CAMERA */
video,canvas{
  width:100%;
  border-radius:12px;
}
</style>
</head>

<body>

<header>📦 Smart Shop Drive v6</header>

<div class="container">

<!-- CONNECT DRIVE -->
<input id="clientId" placeholder="Paste Google Client ID here"/>

<button class="btn" onclick="connectDrive()">🔗 Connect Drive</button>

<!-- CAMERA -->
<video id="video" autoplay playsinline></video>
<button class="btn" onclick="startCamera()">📷 Start Camera</button>
<button class="btn" onclick="capture()">📸 Capture</button>

<canvas id="canvas"></canvas>

<div id="view"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">

<h3>Add Product</h3>

<input id="name" placeholder="Product Name"/>
<input id="price" type="number" placeholder="Price"/>

<select id="category">
  <option>Food</option>
  <option>Drink</option>
  <option>Electronics</option>
</select>

<button class="btn" onclick="saveItem()">Save</button>
<button class="btn" onclick="closePopup()">Close</button>

</div>

<!-- IMAGE ZOOM -->
<div class="modal" id="modal" onclick="closeModal()">
  <img id="modalImg"/>
</div>

<script>

const el = (id)=>document.getElementById(id);

let accessToken="";
let tokenClient=null;
let shopFolderId="";
let imageData="";

/* ================= CONNECT ================= */

function connectDrive(){

  const clientId = el("clientId").value;
  if(!clientId) return alert("Client ID required");

  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: "https://www.googleapis.com/auth/drive.file",
    callback: async (res)=>{
      accessToken = res.access_token;
      await ensureShopFolder();
      await loadDashboard();
    }
  });

  tokenClient.requestAccessToken();
}

/* ================= ROOT FOLDER ================= */

async function ensureShopFolder(){

  const saved = localStorage.getItem("SHOP_ROOT");
  if(saved){
    shopFolderId = saved;
    return;
  }

  const q = encodeURIComponent(
    "name='TheShop' and mimeType='application/vnd.google-apps.folder' and trashed=false"
  );

  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`,
    {headers:{Authorization:"Bearer "+accessToken}}
  );

  const data = await res.json();

  if(data.files?.length){
    shopFolderId = data.files[0].id;
  } else {
    const create = await fetch(
      "https://www.googleapis.com/drive/v3/files",
      {
        method:"POST",
        headers:{
          Authorization:"Bearer "+accessToken,
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          name:"TheShop",
          mimeType:"application/vnd.google-apps.folder"
        })
      }
    );

    const d = await create.json();
    shopFolderId = d.id;
  }

  localStorage.setItem("SHOP_ROOT",shopFolderId);
}

/* ================= CAMERA ================= */

async function startCamera(){
  const video = el("video");
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });
  video.srcObject = stream;
}

function capture(){

  const video = el("video");
  const canvas = el("canvas");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  canvas.getContext("2d").drawImage(video,0,0);

  imageData = canvas.toDataURL("image/png");

  el("popup").style.display="block";
}

/* ================= SAVE ================= */

async function saveItem(){

  const nameVal = el("name").value;
  const priceVal = el("price").value;
  const categoryVal = el("category").value;

  const item = {
    id: crypto.randomUUID(),
    name: nameVal,
    price: priceVal,
    category: categoryVal
  };

  const folder = await getCategoryFolder(categoryVal);

  const img = await merge(item);
  const blob = await (await fetch(img)).blob();

  await upload(blob, item.name+".png", folder);

  imageData="";
  el("popup").style.display="none";

  loadDashboard();
}

/* ================= UPLOAD ================= */

async function upload(blob,name,folder){

  const form = new FormData();

  form.append("metadata", new Blob([JSON.stringify({
    name,
    parents:[folder]
  })],{type:"application/json"}));

  form.append("file", blob);

  await fetch(
    "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",
    {
      method:"POST",
      headers:{Authorization:"Bearer "+accessToken},
      body:form
    }
  );
}

/* ================= CATEGORY ================= */

async function getCategoryFolder(name){

  const q = encodeURIComponent(
    `name='${name}' and '${shopFolderId}' in parents and trashed=false`
  );

  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`,
    {headers:{Authorization:"Bearer "+accessToken}}
  );

  const data = await res.json();

  if(data.files?.length) return data.files[0].id;

  const create = await fetch(
    "https://www.googleapis.com/drive/v3/files",
    {
      method:"POST",
      headers:{
        Authorization:"Bearer "+accessToken,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        name,
        parents:[shopFolderId],
        mimeType:"application/vnd.google-apps.folder"
      })
    }
  );

  const d = await create.json();
  return d.id;
}

/* ================= DASHBOARD (CATEGORIES) ================= */

async function loadDashboard(){

  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q='${shopFolderId}'+in+parents&fields=files(id,name,mimeType)`,
    {headers:{Authorization:"Bearer "+accessToken}}
  );

  const data = await res.json();

  let html="<h3>Categories</h3><div class='grid'>";

  (data.files||[])
    .filter(f=>f.mimeType.includes("folder"))
    .forEach(f=>{
      html+=`
        <div class="card" onclick="openCategory('${f.id}','${f.name}')">
          📁 ${f.name}
        </div>
      `;
    });

  el("view").innerHTML=html;
}

/* ================= CATEGORY IMAGES (THUMBNAILS) ================= */

async function openCategory(id,name){

  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q='${id}'+in+parents&fields=files(id,name,thumbnailLink,webContentLink)`,
    {headers:{Authorization:"Bearer "+accessToken}}
  );

  const data = await res.json();

  let html = `
    <h3>${name}</h3>
    <button class="btn" onclick="loadDashboard()">Back</button>
    <div class="grid">
  `;

  (data.files||[]).forEach(f=>{
    html+=`
      <div class="imgCard" onclick="openImage('${f.webContentLink || f.thumbnailLink}')">
        <img src="${f.thumbnailLink || ''}">
        <div style="padding:6px;font-size:12px">${f.name}</div>
      </div>
    `;
  });

  html += "</div>";

  el("view").innerHTML=html;
}

/* ================= IMAGE ZOOM ================= */

function openImage(src){
  el("modalImg").src = src;
  el("modal").style.display="flex";
}

function closeModal(){
  el("modal").style.display="none";
}

function closePopup(){
  el("popup").style.display="none";
}

</script>

</body>
</html>
