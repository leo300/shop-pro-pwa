<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Shop Drive FIX</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{background:#0f172a;color:white;}
header{background:#111827;padding:12px;text-align:center;font-weight:bold;}
.card-dark{background:#1f2937;border-radius:12px;padding:10px;cursor:pointer;}
.card-dark:hover{background:#374151;}
img{width:100%;border-radius:10px;}
.active{border:2px solid #22c55e;}
</style>
</head>

<body>

<header>Smart Shop Drive FIX</header>

<div class="container py-3">

<input id="clientId" class="form-control mb-2" placeholder="Google Client ID">

<button class="btn btn-primary w-100 mb-2" onclick="connectDrive()">Connect Drive</button>

<button class="btn btn-secondary w-100 mb-2" onclick="goRoot()">🏠 Root</button>

<video id="video" autoplay playsinline></video>

<button class="btn btn-success w-100 mt-2" onclick="startCamera()">Start Camera</button>
<button class="btn btn-warning w-100 mt-2" onclick="capture()">Capture</button>

<canvas id="canvas" style="display:none;"></canvas>

<hr>

<div id="view"></div>

</div>

<!-- MODAL -->
<div class="modal fade" id="productModal">
  <div class="modal-dialog">
    <div class="modal-content text-dark">

      <div class="modal-header">
        <h5>Add Product</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input id="name" class="form-control mb-2" placeholder="Name">
        <input id="price" class="form-control mb-2" type="number" placeholder="Price">

        <select id="category" class="form-select">
          <option>Food</option>
          <option>Drink</option>
          <option>Electronics</option>
        </select>
      </div>

      <div class="modal-footer">
        <button class="btn btn-primary" onclick="saveItem()">Save</button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const el = id => document.getElementById(id);

let token = "";
let rootFolder = "";
let currentFolder = null;
let imageData = "";

/* TOAST */
function toast(msg){
  alert(msg);
}

/* CONNECT */
function connectDrive(){
  const clientId = el("clientId").value;
  if(!clientId) return toast("Client ID missing");

  const client = google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: "https://www.googleapis.com/auth/drive.file",
    callback: async (res)=>{
      token = res.access_token;
      await initRoot();
      loadRoot();
    }
  });

  client.requestAccessToken();
}

/* ROOT */
async function initRoot(){

  const q = encodeURIComponent("name='TheShop' and mimeType='application/vnd.google-apps.folder' and trashed=false");

  const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`,{
    headers:{Authorization:"Bearer "+token}
  });

  const data = await res.json();

  if(data.files?.length){
    rootFolder = data.files[0].id;
  } else {
    const r = await fetch("https://www.googleapis.com/drive/v3/files",{
      method:"POST",
      headers:{
        Authorization:"Bearer "+token,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        name:"TheShop",
        mimeType:"application/vnd.google-apps.folder"
      })
    });

    const d = await r.json();
    rootFolder = d.id;
  }
}

/* LOAD ROOT FOLDERS */
async function loadRoot(){

  currentFolder = null;

  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q='${rootFolder}'+in+parents&fields=files(id,name,mimeType)`,
    {headers:{Authorization:"Bearer "+token}}
  );

  const data = await res.json();

  let html = `<h5>Categories</h5><div class="row g-2">`;

  (data.files||[])
    .filter(f=>f.mimeType.includes("folder"))
    .forEach(f=>{
      html += `
        <div class="col-6">
          <div class="card-dark text-center"
               onclick="openFolder('${f.id}','${f.name}')">
            <i class="fa fa-folder fa-2x"></i>
            <div>${f.name}</div>
          </div>
        </div>
      `;
    });

  html += "</div>";

  el("view").innerHTML = html;
}

/* OPEN CATEGORY */
async function openFolder(id,name){

  currentFolder = id;

  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q='${id}'+in+parents&fields=files(id,name,mimeType,thumbnailLink)`,
    {headers:{Authorization:"Bearer "+token}}
  );

  const data = await res.json();

  let html = `<h5>${name}</h5><div class="row g-2">`;

  if(!data.files.length){
    html += `<p>No items in this folder</p>`;
  }

  data.files.forEach(f=>{
    html += `
      <div class="col-6">
        <div class="card-dark">
          <div>${f.name}</div>
        </div>
      </div>
    `;
  });

  html += "</div>";

  el("view").innerHTML = html;
}

/* BACK */
function goRoot(){
  loadRoot();
}

/* CAMERA */
async function startCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
  el("video").srcObject = stream;
}

function capture(){
  const v = el("video");
  const c = el("canvas");

  c.width = v.videoWidth;
  c.height = v.videoHeight;

  c.getContext("2d").drawImage(v,0,0);

  imageData = c.toDataURL("image/png");

  new bootstrap.Modal(el("productModal")).show();
}

/* SAVE */
async function saveItem(){

  const name = el("name").value;
  const price = el("price").value;
  const category = el("category").value;

  if(!currentFolder){
    return toast("Open a category first!");
  }

  const blob = await (await fetch(imageData)).blob();

  const metadata = {
    name: name + ".png",
    parents: [currentFolder]
  };

  const form = new FormData();
  form.append("metadata", new Blob([JSON.stringify(metadata)], {type:"application/json"}));
  form.append("file", blob);

  const res = await fetch(
    "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id",
    {
      method:"POST",
      headers:{Authorization:"Bearer "+token},
      body:form
    }
  );

  const data = await res.json();

  toast("Saved into folder ✔");

  bootstrap.Modal.getInstance(el("productModal")).hide();

  openFolder(currentFolder, "Folder");
}

</script>

</body>
</html>
